<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Test</title>
</head>
<body>

    <button onclick="window.location.href='index.html'">Go Back to Index</button>
    <br><br>

    <label for="sku">SKU (type manually):</label>
    <input type="text" id="sku" name="sku">
    <br><br>

    <label for="scan">Scan Barcode:</label>
    <input type="text" id="scan" name="scan" autofocus>
    <br><br>

    <label for="lot">LOT:</label>
    <input type="text" id="lot" name="lot">
    <br><br>

    <label for="expiration">Expiration Date:</label>
    <input type="date" id="expiration" name="expiration">
    <br><br>

    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity">
    <br><br>

    <button type="submit">Submit</button>

    <script>
        const scanInput = document.getElementById('scan');
        const lotInput = document.getElementById('lot');
        const expirationInput = document.getElementById('expiration');

        scanInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const data = scanInput.value.trim();

                console.log("Scan:", data);
                console.log("Char codes:", [...data].map(c => c.charCodeAt(0)));

                // --- Extract EXP (AI 17 = YYMMDD) ---
                const expMatch = data.match(/17(\d{6})/);
                if (expMatch) {
                    const raw = expMatch[1];
                    const year = '20' + raw.slice(0, 2);
                    const month = raw.slice(2, 4);
                    const day = raw.slice(4, 6);
                    expirationInput.value = `${year}-${month}-${day}`;
                }

                // --- Extract LOT (AI 10, variable length) ---
                // Stops at GS (ASCII 29) OR next AI like 17
                let lot = '';

                const gsIndex = data.indexOf(String.fromCharCode(29));
                const lotStart = data.indexOf('10');

                if (lotStart !== -1) {
                    let lotEnd = data.length;

                    if (gsIndex !== -1 && gsIndex > lotStart) {
                        lotEnd = gsIndex;
                    } else {
                        const nextAI = data.slice(lotStart + 2).match(/(17|01|21)/);
                        if (nextAI) {
                            lotEnd = lotStart + 2 + nextAI.index;
                        }
                    }

                    lot = data.slice(lotStart + 2, lotEnd);
                }

                if (lot) {
                    lotInput.value = lot;
                }

                // Clear scan box for next scan
                scanInput.value = '';

                // Move to quantity for fast workflow
                document.getElementById('quantity').focus();
            }
        });
    </script>

</body>
</html>
