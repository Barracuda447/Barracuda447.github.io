<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Flow</title>
    <style>
        .step { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <h2 id="title">Step 1: Enter SKU</h2>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
        <input type="text" id="sku" placeholder="Enter SKU">
        <br><br>
        <button onclick="nextStep(2)">Next</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">
        <p>Scan barcode</p>
        <input type="text" id="scanInput" autofocus>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step">
        <p>Review / Edit</p>

        <label>LOT:</label><br>
        <input type="text" id="lot"><br><br>

        <label>Expiration:</label><br>
        <input type="date" id="exp"><br><br>

        <button onclick="nextStep(4)">Confirm</button>
    </div>

    <!-- STEP 4 -->
    <div id="step4" class="step">
        <p>Enter Quantity</p>
        <input type="number" id="qty"><br><br>
        <button onclick="submitForm()">Submit</button>
    </div>

    <script>
        let currentStep = 1;

        function nextStep(step) {
            document.getElementById('step' + currentStep).classList.remove('active');
            currentStep = step;
            document.getElementById('step' + currentStep).classList.add('active');

            updateTitle();

            const input = document.querySelector('#step' + currentStep + ' input');
            if (input) input.focus();
        }

        function updateTitle() {
            const titles = {
                1: "Step 1: Enter SKU",
                2: "Step 2: Scan Barcode",
                3: "Step 3: Review / Edit",
                4: "Step 4: Enter Quantity"
            };
            document.getElementById('title').innerText = titles[currentStep];
        }

        // --- HANDLE SCAN ---
        document.getElementById('scanInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                let data = this.value.trim();

                console.log("RAW:", data);

                let working = data;

                // --- If long, assume GTIN and remove it ---
                if (data.length >= 20 && data.startsWith('01')) {
                    working = data.slice(16);
                    console.log("GTIN removed:", working);
                }

                // --- EXP ---
                const expMatch = working.match(/17(\d{6})/);
                if (expMatch) {
                    const raw = expMatch[1];
                    const formatted = `20${raw.slice(0,2)}-${raw.slice(2,4)}-${raw.slice(4,6)}`;
                    document.getElementById('exp').value = formatted;
                }

                // --- LOT ---
                let lot = '';
                const lotStart = working.indexOf('10');
                const expStart = working.indexOf('17');

                if (lotStart !== -1) {
                    if (expStart !== -1 && expStart > lotStart) {
                        lot = working.slice(lotStart + 2, expStart);
                    } else {
                        lot = working.slice(lotStart + 2);
                    }
                }

                console.log("LOT parsed:", lot);

                document.getElementById('lot').value = lot;

                this.value = '';
                nextStep(3);
            }
        });

        function submitForm() {
            const result = {
                sku: document.getElementById('sku').value,
                lot: document.getElementById('lot').value,
                exp: document.getElementById('exp').value,
                qty: document.getElementById('qty').value
            };

            console.log("FINAL:", result);
            alert("Submitted!");

            location.reload();
        }
    </script>

</body>
</html>
