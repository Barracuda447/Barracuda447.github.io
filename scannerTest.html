<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Counter</title>
    <style>
        body { font-family: Arial; }
        .hidden { display: none; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>

    <h2>Scan Items</h2>

    <!-- SKU ENTRY -->
    <div id="skuSection">
        <label>Enter SKU:</label><br>
        <input type="text" id="sku">
        <br><br>
        <button onclick="startScanning()">Start Scanning</button>
    </div>

    <!-- SCANNING -->
    <div id="scanSection" class="hidden">
        <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>
        <p>Scan continuously...</p>
        <input type="text" id="scanInput" autofocus>
    </div>

    <!-- RESULTS -->
    <table id="resultTable" class="hidden">
        <thead>
            <tr>
                <th>LOT</th>
                <th>Expiration</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <br>
    <button onclick="resetAll()">Reset</button>

    <script>
        const scanInput = document.getElementById('scanInput');
        const tableBody = document.querySelector('#resultTable tbody');

        let dataStore = {};
        let buffer = '';
        let timer = null;

        function startScanning() {
            const sku = document.getElementById('sku').value.trim();
            if (!sku) return alert("Enter SKU first");

            document.getElementById('skuDisplay').innerText = sku;
            document.getElementById('skuSection').classList.add('hidden');
            document.getElementById('scanSection').classList.remove('hidden');
            document.getElementById('resultTable').classList.remove('hidden');

            scanInput.focus();
        }

        scanInput.addEventListener('input', function() {
            buffer = scanInput.value;

            // Reset timer on every keystroke
            clearTimeout(timer);

            timer = setTimeout(() => {
                processScan(buffer.trim());
                buffer = '';
                scanInput.value = '';
            }, 100); // adjust if needed (80–150ms typical)
        });

        function processScan(raw) {
            if (!raw) return;

            console.log("SCAN:", raw);

            let working = raw;

            // Remove GTIN
            if (working.length >= 20 && working.startsWith('01')) {
                working = working.slice(16);
            }

            // --- EXP ---
            let exp = '';
            const expMatch = working.match(/17(\d{6})/);
            if (expMatch) {
                const r = expMatch[1];
                exp = `20${r.slice(0,2)}-${r.slice(2,4)}-${r.slice(4,6)}`;
            }

            // --- LOT ---
            let lot = '';
            const lotStart = working.indexOf('10');
            const expStart = working.indexOf('17');

            if (lotStart !== -1) {
                if (expStart !== -1 && expStart > lotStart) {
                    lot = working.slice(lotStart + 2, expStart);
                } else {
                    lot = working.slice(lotStart + 2);
                }
            }

            if (!lot || !exp) {
                console.log("Parse failed:", raw);
                return;
            }

            const key = lot + "|" + exp;

            if (!dataStore[key]) {
                dataStore[key] = { lot, exp, qty: 0 };
            }

            dataStore[key].qty++;

            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = '';

            Object.values(dataStore).forEach(item => {
                const row = document.createElement('tr');

                row.innerHTML = `
                    <td>${item.lot}</td>
                    <td>${item.exp}</td>
                    <td>${item.qty}</td>
                `;

                tableBody.appendChild(row);
            });
        }

        function resetAll() {
            location.reload();
        }
    </script>

</body>
</html>
