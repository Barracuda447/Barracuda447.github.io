<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Counter</title>
    <style>
        body { font-family: Arial; }
        .hidden { display: none; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>

<h2>Scan Items</h2>

<div id="skuSection">
    <label>Enter SKU:</label><br>
    <input type="text" id="sku">
    <br><br>
    <button onclick="startScanning()">Start Scanning</button>
</div>

<div id="scanSection" class="hidden">
    <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>
    <input type="text" id="scanInput" autofocus>
</div>

<table id="resultTable" class="hidden">
    <thead>
        <tr>
            <th>LOT</th>
            <th>Expiration</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<button onclick="resetAll()">Reset</button>

<script>
const scanInput = document.getElementById('scanInput');
const tableBody = document.querySelector('#resultTable tbody');

let dataStore = {};
let buffer = '';
let timer = null;

function startScanning() {
    const sku = document.getElementById('sku').value.trim();
    if (!sku) return alert("Enter SKU first");

    document.getElementById('skuDisplay').innerText = sku;
    document.getElementById('skuSection').classList.add('hidden');
    document.getElementById('scanSection').classList.remove('hidden');
    document.getElementById('resultTable').classList.remove('hidden');

    scanInput.focus();
}

// --- scan detection ---
scanInput.addEventListener('input', function () {
    buffer = scanInput.value;

    clearTimeout(timer);

    timer = setTimeout(() => {
        processScan(buffer);
        buffer = '';
        scanInput.value = '';
    }, 100);
});

function processScan(raw) {
    if (!raw) return;

    console.log("RAW:", raw);

    let data = raw;

    // --- GTIN removal ---
    if (/^01\d{14}/.test(data)) {
        data = data.slice(16);
    }

    console.log("WORKING:", data);

    const GS = String.fromCharCode(29);

    let exp = '';
    let lot = '';

    // =========================
    // STREAM PARSER
    // =========================
    for (let i = 0; i < data.length; i++) {

        // --- EXP (17 + 6 digits) ---
        if (data[i] === '1' && data[i+1] === '7') {
            const candidate = data.slice(i + 2, i + 8);

            if (/^\d{6}$/.test(candidate)) {
                const r = candidate;
                exp = `20${r.slice(0,2)}-${r.slice(2,4)}-${r.slice(4,6)}`;
                i += 7;
                continue;
            }
        }

        // --- LOT (10 + variable) ---
        if (data[i] === '1' && data[i+1] === '0') {
            i += 2;

            while (i < data.length) {
                const ch = data[i];

                // stop on GS or control char
                if (ch === GS || ch.charCodeAt(0) < 32) break;

                // stop if we hit a new AI safely (17 or 10 again)
                if (data[i] === '1' && (data[i+1] === '7' || data[i+1] === '0')) break;

                lot += ch;
                i++;
            }

            continue;
        }
    }

    console.log("LOT:", lot, "EXP:", exp);

    if (!lot || !exp) {
        console.log("Parse failed:", raw);
        return;
    }

    const key = lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = { lot, exp, qty: 0 };
    }

    dataStore[key].qty++;

    renderTable();
}

function renderTable() {
    tableBody.innerHTML = '';

    Object.values(dataStore).forEach(item => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${item.lot}</td>
            <td>${item.exp}</td>
            <td>${item.qty}</td>
        `;

        tableBody.appendChild(row);
    });
}

function resetAll() {
    location.reload();
}
</script>

</body>
</html>
