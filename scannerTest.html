<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Counter</title>
    <style>
        body { font-family: Arial; }
        .hidden { display: none; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>

<h2>Scan Items</h2>

<div id="skuSection">
    <label>Enter SKU:</label><br>
    <input type="text" id="sku">
    <br><br>
    <button onclick="startScanning()">Start Scanning</button>
</div>

<div id="scanSection" class="hidden">
    <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>
    <p>Scan continuously...</p>
    <input type="text" id="scanInput" autofocus>
</div>

<table id="resultTable" class="hidden">
    <thead>
        <tr>
            <th>LOT</th>
            <th>Expiration</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<button onclick="resetAll()">Reset</button>

<script>
const scanInput = document.getElementById('scanInput');
const tableBody = document.querySelector('#resultTable tbody');

let dataStore = {};
let buffer = '';
let timer = null;
let lastInputTime = Date.now();

function startScanning() {
    const sku = document.getElementById('sku').value.trim();
    if (!sku) return alert("Enter SKU first");

    document.getElementById('skuDisplay').innerText = sku;
    document.getElementById('skuSection').classList.add('hidden');
    document.getElementById('scanSection').classList.remove('hidden');
    document.getElementById('resultTable').classList.remove('hidden');

    scanInput.focus();
}

// =========================
// BETTER SCAN DETECTION
// =========================
scanInput.addEventListener('input', function () {
    const now = Date.now();
    const diff = now - lastInputTime;
    lastInputTime = now;

    // If too slow → treat as manual typing → reset buffer
    if (diff > 50) buffer = '';

    buffer += scanInput.value;
    scanInput.value = '';

    clearTimeout(timer);
    timer = setTimeout(() => {
        processScan(buffer);
        buffer = '';
    }, 50);
});

// =========================
// GS1 PARSER
// =========================
function processScan(raw) {
    if (!raw) return;

    console.log("RAW:", raw);

    const GS = String.fromCharCode(29);

    const AI_MAP = {
        "01": { length: 14, fixed: true }, // GTIN
        "17": { length: 6, fixed: true },  // Expiration
        "10": { fixed: false },            // Lot
        "21": { fixed: false },            // Serial (optional future use)
    };

    let i = 0;
    let parsed = {};

    while (i < raw.length) {
        let ai = raw.substr(i, 2);

        if (!AI_MAP[ai]) {
            i++; // skip unknown safely
            continue;
        }

        i += 2;

        if (AI_MAP[ai].fixed) {
            const len = AI_MAP[ai].length;
            parsed[ai] = raw.substr(i, len);
            i += len;
        } else {
            let value = '';
            while (i < raw.length && raw[i] !== GS) {
                value += raw[i];
                i++;
            }
            parsed[ai] = value;

            if (raw[i] === GS) i++; // skip GS
        }
    }

    console.log("PARSED:", parsed);

    // =========================
    // FIELD EXTRACTION
    // =========================
    let lot = parsed["10"] || '';
    let expRaw = parsed["17"] || '';

    let exp = '';
    if (expRaw.length === 6) {
        exp = `20${expRaw.slice(0,2)}-${expRaw.slice(2,4)}-${expRaw.slice(4,6)}`;
    }

    console.log("LOT:", lot, "EXP:", exp);

    if (!lot || !exp) {
        console.log("Parse failed:", raw);
        return;
    }

    const key = lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = { lot, exp, qty: 0 };
    }

    dataStore[key].qty++;

    renderTable();
}

// =========================
// TABLE RENDER
// =========================
function renderTable() {
    tableBody.innerHTML = '';

    Object.values(dataStore).forEach(item => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${item.lot}</td>
            <td>${item.exp}</td>
            <td>${item.qty}</td>
        `;

        tableBody.appendChild(row);
    });
}

// =========================
// RESET
// =========================
function resetAll() {
    location.reload();
}
</script>

</body>
</html>
