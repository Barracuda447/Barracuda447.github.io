<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Counter</title>
    <style>
        body { font-family: Arial; }
        .hidden { display: none; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>

<h2>Scan Items</h2>

<div id="skuSection">
    <label>Enter SKU:</label><br>
    <input type="text" id="sku">
    <br><br>
    <button onclick="startScanning()">Start Scanning</button>
</div>

<div id="scanSection" class="hidden">
    <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>
    <p>Scan continuously...</p>
    <input type="text" id="scanInput" autofocus>
</div>

<table id="resultTable" class="hidden">
    <thead>
        <tr>
            <th>LOT</th>
            <th>Expiration</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<button onclick="resetAll()">Reset</button>

<script>
const scanInput = document.getElementById('scanInput');
const tableBody = document.querySelector('#resultTable tbody');

let dataStore = {};

function startScanning() {
    const sku = document.getElementById('sku').value.trim();
    if (!sku) return alert("Enter SKU first");

    document.getElementById('skuDisplay').innerText = sku;
    document.getElementById('skuSection').classList.add('hidden');
    document.getElementById('scanSection').classList.remove('hidden');
    document.getElementById('resultTable').classList.remove('hidden');

    scanInput.focus();
}

// =========================
// RELIABLE SCAN (ENTER-BASED)
// =========================
scanInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
        e.preventDefault();

        let value = normalizeRaw(scanInput.value);

        if (value) {
            processScan(value);
        }

        scanInput.value = '';
    }
});

// Always keep focus
setInterval(() => {
    if (document.activeElement !== scanInput) {
        scanInput.focus();
    }
}, 500);

// =========================
// NORMALIZATION (KEY FIX)
// =========================
function normalizeRaw(raw) {
    if (!raw) return '';

    let GS = String.fromCharCode(29);

    // Convert common scanner variations into GS
    return raw
        .replace(/\u001D/g, GS)
        .replace(/\]/g, GS)
        .replace(/~/g, GS)
        .replace(/\s+/g, '')
        .trim();
}

// =========================
// GS1 PARSER (CONSISTENT)
// =========================
function processScan(raw) {
    console.log("RAW:", raw);

    const GS = String.fromCharCode(29);

    const AI_MAP = {
        "01": { length: 14, fixed: true },
        "17": { length: 6, fixed: true },
        "10": { fixed: false },
        "21": { fixed: false },
    };

    let i = 0;
    let parsed = {};

    while (i < raw.length) {
        let ai = raw.substr(i, 2);

        if (!AI_MAP[ai]) {
            i++;
            continue;
        }

        i += 2;

        if (AI_MAP[ai].fixed) {
            const len = AI_MAP[ai].length;
            parsed[ai] = raw.substr(i, len);
            i += len;
        } else {
            let value = '';

            while (i < raw.length) {
                let ch = raw[i];

                if (ch === GS) {
                    i++;
                    break;
                }

                let nextTwo = raw.substr(i, 2);
                if (AI_MAP[nextTwo]) break;

                value += ch;
                i++;
            }

            parsed[ai] = value;
        }
    }

    console.log("PARSED:", parsed);

    // =========================
    // FIELD EXTRACTION
    // =========================
    let lot = (parsed["10"] || '').trim();
    let expRaw = (parsed["17"] || '').trim();

    let exp = '';
    if (/^\d{6}$/.test(expRaw)) {
        exp = `20${expRaw.slice(0,2)}-${expRaw.slice(2,4)}-${expRaw.slice(4,6)}`;
    }

    console.log("LOT:", lot, "EXP:", exp);

    // ✅ UPDATED LOGIC: allow LOT-only scans
    if (!lot) {
        console.log("Parse failed (no LOT):", raw);
        return;
    }

    // expiry can be blank
    if (!exp) {
        exp = '';
    }

    const key = lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = { lot, exp, qty: 0 };
    }

    dataStore[key].qty++;

    renderTable();
}

// =========================
// TABLE RENDER
// =========================
function renderTable() {
    tableBody.innerHTML = '';

    Object.values(dataStore).forEach(item => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${item.lot}</td>
            <td>${item.exp}</td>
            <td>${item.qty}</td>
        `;

        tableBody.appendChild(row);
    });
}

// =========================
// RESET
// =========================
function resetAll() {
    location.reload();
}
</script>

</body>
</html>
