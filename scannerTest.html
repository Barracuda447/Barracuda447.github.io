<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Counter</title>
    <style>
        body { font-family: Arial; }
        .hidden { display: none; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>

    <h2>Scan Items</h2>

    <!-- SKU -->
    <div id="skuSection">
        <label>Enter SKU:</label><br>
        <input type="text" id="sku">
        <br><br>
        <button onclick="startScanning()">Start Scanning</button>
    </div>

    <!-- SCAN -->
    <div id="scanSection" class="hidden">
        <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>
        <p>Scan continuously...</p>
        <input type="text" id="scanInput" autofocus>
    </div>

    <!-- TABLE -->
    <table id="resultTable" class="hidden">
        <thead>
            <tr>
                <th>LOT</th>
                <th>Expiration</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <br>
    <button onclick="resetAll()">Reset</button>

    <script>
        const scanInput = document.getElementById('scanInput');
        const tableBody = document.querySelector('#resultTable tbody');

        let dataStore = {};
        let buffer = '';
        let timer = null;

        function startScanning() {
            const sku = document.getElementById('sku').value.trim();
            if (!sku) return alert("Enter SKU first");

            document.getElementById('skuDisplay').innerText = sku;
            document.getElementById('skuSection').classList.add('hidden');
            document.getElementById('scanSection').classList.remove('hidden');
            document.getElementById('resultTable').classList.remove('hidden');

            scanInput.focus();
        }

        // --- NO ENTER REQUIRED: scan burst detection ---
        scanInput.addEventListener('input', function() {
            buffer = scanInput.value;

            clearTimeout(timer);

            timer = setTimeout(() => {
                processScan(buffer.trim());
                buffer = '';
                scanInput.value = '';
            }, 100); // adjust 80–150ms if needed
        });

        function processScan(raw) {
            if (!raw) return;

            console.log("RAW:", raw);

            let working = raw;

            // --- Remove GTIN if present (01 + 14 digits) ---
            if (working.startsWith('01') && working.length >= 20) {
                working = working.slice(16);
            }

            console.log("WORKING:", working);

            // --- EXP (17) ---
            let exp = '';
            const expMatch = working.match(/17(\d{6})/);

            if (expMatch) {
                const r = expMatch[1];
                exp = `20${r.slice(0,2)}-${r.slice(2,4)}-${r.slice(4,6)}`;
            }

            // --- LOT (MUST start at 10, stop at next AI) ---
            let lot = '';

            const lotIndex = working.indexOf('10');

            if (lotIndex !== -1) {
                let after = working.slice(lotIndex + 2);

                // Find next AI (any 2-digit AI like 17, 21, 11, etc.)
                const nextAI = after.search(/\d{2}(?=\d)/);

                if (nextAI !== -1) {
                    lot = after.slice(0, nextAI);
                } else {
                    lot = after;
                }
            }

            console.log("LOT:", lot, "EXP:", exp);

            if (!lot || !exp) {
                console.log("Parse failed:", raw);
                return;
            }

            const key = lot + "|" + exp;

            if (!dataStore[key]) {
                dataStore[key] = { lot, exp, qty: 0 };
            }

            dataStore[key].qty++;

            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = '';

            Object.values(dataStore).forEach(item => {
                const row = document.createElement('tr');

                row.innerHTML = `
                    <td>${item.lot}</td>
                    <td>${item.exp}</td>
                    <td>${item.qty}</td>
                `;

                tableBody.appendChild(row);
            });
        }

        function resetAll() {
            location.reload();
        }
    </script>

</body>
</html>
