<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Steps</title>
    <style>
        .step { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <h2 id="title">Step 1: Enter SKU</h2>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
        <input type="text" id="sku" placeholder="Enter SKU">
        <br><br>
        <button onclick="nextStep(2)">Next</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">
        <p>Scan LOT barcode</p>
        <input type="text" id="lotScan" autofocus>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step">
        <p>Scan EXP barcode</p>
        <input type="text" id="expScan">
    </div>

    <!-- STEP 4 -->
    <div id="step4" class="step">
        <p>Enter Quantity</p>
        <input type="number" id="quantity">
        <br><br>
        <button onclick="submitForm()">Submit</button>
    </div>

    <br><br>

    <h3>Collected Data:</h3>
    SKU: <span id="outSku"></span><br>
    LOT: <span id="outLot"></span><br>
    EXP: <span id="outExp"></span><br>
    QTY: <span id="outQty"></span>

    <script>
        let currentStep = 1;

        function nextStep(step) {
            document.getElementById('step' + currentStep).classList.remove('active');
            currentStep = step;
            document.getElementById('step' + currentStep).classList.add('active');

            updateTitle();

            // focus next input
            const input = document.querySelector('#step' + currentStep + ' input');
            if (input) input.focus();
        }

        function updateTitle() {
            const titles = {
                1: "Step 1: Enter SKU",
                2: "Step 2: Scan LOT",
                3: "Step 3: Scan Expiration",
                4: "Step 4: Enter Quantity"
            };
            document.getElementById('title').innerText = titles[currentStep];
        }

        // --- LOT SCAN ---
        document.getElementById('lotScan').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                let data = this.value.trim();

                // Extract LOT (AI 10)
                let match = data.match(/10([^\x1D]+)/);
                let lot = match ? match[1] : data;

                document.getElementById('outLot').innerText = lot;

                this.value = '';
                nextStep(3);
            }
        });

        // --- EXP SCAN ---
        document.getElementById('expScan').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                let data = this.value.trim();

                // Extract EXP (AI 17)
                let match = data.match(/17(\d{6})/);
                let formatted = '';

                if (match) {
                    let raw = match[1];
                    formatted = `20${raw.slice(0,2)}-${raw.slice(2,4)}-${raw.slice(4,6)}`;
                } else {
                    formatted = data;
                }

                document.getElementById('outExp').innerText = formatted;

                this.value = '';
                nextStep(4);
            }
        });

        function submitForm() {
            const sku = document.getElementById('sku').value;
            const qty = document.getElementById('quantity').value;

            document.getElementById('outSku').innerText = sku;
            document.getElementById('outQty').innerText = qty;

            alert("Submitted!");

            // reset
            location.reload();
        }
    </script>

</body>
</html>
