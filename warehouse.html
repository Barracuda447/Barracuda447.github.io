<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Warehouse</title>
</head>
<body>

  <h2>For which warehouse?</h2>

  <button onclick="selectWarehouse('AB')">AB</button>
  <button onclick="selectWarehouse('ON')">ON</button>

  <br><br>

  <button onclick="goBack()">Cancel</button>

  <script>
    function selectWarehouse(warehouse) {
      window.location.href = "bin.html?warehouse=" + warehouse;
    }

    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
