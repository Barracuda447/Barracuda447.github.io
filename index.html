<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Warehouse</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            padding: 0;
            background: rgb(0,0,0);
            color: rgb(255,224,0);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            font-size: 34px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        button {
            font-size: 26px;
            padding: 22px 50px;
            margin: 16px;
            cursor: pointer;
            background: rgb(0,0,0);
            color: rgb(255,224,0);
            border: 3px solid rgb(255,224,0);
            border-radius: 10px;
            min-width: 180px;
            touch-action: manipulation;
        }

        button:active {
            background: rgb(255,224,0);
            color: rgb(0,0,0);
        }

        button:hover {
            background: rgb(255,224,0);
            color: rgb(0,0,0);
        }
    </style>
</head>

<body>

<h1>Select Warehouse</h1>

<button onclick="selectWarehouse('AB')">AB</button>
<button onclick="selectWarehouse('ON')">ON</button>
<button onclick="receiving()">Receiving</button>

<script>
function selectWarehouse(warehouse) {
    localStorage.setItem("warehouse", warehouse);
    window.location.href = "cycle.html";
}

function receiving() {
    window.location.href = "receiving.html";
}
</script>

</body>
</html>
