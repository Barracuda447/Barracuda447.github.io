<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Baseline Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            display: block;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn-secondary:disabled {
            background: #dee2e6;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .file-info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info strong {
            color: #1976D2;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 30px;
            display: none;
        }

        .table-container.show {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-top: 3px solid #667eea;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Inventory Baseline</h1>
        <p class="subtitle">Upload and view your Excel inventory file</p>

        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>

        <div class="upload-section" id="uploadSection">
            <label for="fileInput" class="upload-label">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-hint">Excel files (.xlsx, .xls, .csv)</div>
            </label>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
        </div>

        <div class="button-group">
            <button class="btn-primary" id="uploadButton">Choose File</button>
            <button class="btn-secondary" id="clearButton" disabled>Clear Data</button>
        </div>

        <div id="fileInfo" class="file-info">
            <strong>Loaded File:</strong> <span id="fileName"></span>
        </div>

        <div id="stats" class="stats"></div>

        <div id="tableContainer" class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="headerRow"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const clearButton = document.getElementById('clearButton');
        const uploadSection = document.getElementById('uploadSection');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const tableContainer = document.getElementById('tableContainer');
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');
        const statsContainer = document.getElementById('stats');

        // Upload button click
        uploadButton.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.background = '#f0f2ff';
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.style.background = '#f8f9fa';
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.background = '#f8f9fa';
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });

        // Clear button
        clearButton.addEventListener('click', () => {
            fileInput.value = '';
            tableContainer.classList.remove('show');
            fileInfo.classList.remove('show');
            statsContainer.innerHTML = '';
            clearButton.disabled = true;
            uploadButton.disabled = false;
            hideMessages();
        });

        function handleFileSelect() {
            const file = fileInput.files[0];
            
            if (!file) return;

            hideMessages();

            try {
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    try {
                        const data = e.target.result;
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        if (workbook.SheetNames.length === 0) {
                            showError('No sheets found in the file.');
                            return;
                        }

                        // Get first sheet
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        if (jsonData.length === 0) {
                            showError('The file is empty or could not be read.');
                            return;
                        }

                        displayData(jsonData, file.name);
                        showSuccess(`Successfully loaded "${file.name}"`);
                        clearButton.disabled = false;
                        uploadButton.disabled = true;
                    } catch (error) {
                        showError(`Error processing file: ${error.message}`);
                    }
                };

                reader.onerror = () => {
                    showError('Error reading the file. Please try again.');
                };

                reader.readAsArrayBuffer(file);
            } catch (error) {
                showError(`Error: ${error.message}`);
            }
        }

        function displayData(data, name) {
            // Clear previous data
            headerRow.innerHTML = '';
            tableBody.innerHTML = '';
            statsContainer.innerHTML = '';

            // Get headers (first row)
            const headers = data[0] || [];

            // Create header row
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header || 'Column';
                headerRow.appendChild(th);
            });

            // Create data rows
            let rowCount = 0;
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.every(cell => !cell)) continue; // Skip empty rows

                const tr = document.createElement('tr');
                headers.forEach((header, index) => {
                    const td = document.createElement('td');
                    td.textContent = row[index] || '';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
                rowCount++;
            }

            // Update file info
            fileName.textContent = name;
            fileInfo.classList.add('show');

            // Display stats
            const statHTML = `
                <div class="stat-card">
                    <div class="stat-value">${headers.length}</div>
                    <div class="stat-label">Columns</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${rowCount}</div>
                    <div class="stat-label">Rows</div>
                </div>
            `;
            statsContainer.innerHTML = statHTML;

            // Show table
            tableContainer.classList.add('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }
    </script>
</body>
</html>
