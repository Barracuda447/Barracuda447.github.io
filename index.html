<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Count</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #table-container {
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Cycle Count</h2>

  <div id="table-container">
    <!-- Existing table goes here -->
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Count</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Sample Item</td>
          <td>0</td>
        </tr>
      </tbody>
    </table>
  </div>

  <button onclick="createNewCount()">Create New Count</button>

  <script>
    function createNewCount() {
      alert("Create new count clicked");
    }
  </script>

</body>
</html>
