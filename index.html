<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Count</title>
</head>
<body>

  <h2>Cycle Count</h2>

  <table border="1">
    <tr>
      <th>Warehouse</th>
      <th>Bin</th>
      <th>Item</th>
      <th>LOT</th>
      <th>Expiration Date</th>
      <th>On Hand</th>
    </tr>
    <tbody id="mainTableBody"></tbody>
  </table>

  <br>

  <button onclick="goToWarehouse()">Create New Count</button>

  <script>
    function goToWarehouse() {
      window.location.href = "warehouse.html";
    }

    function loadCompleted() {
      const key = "completedCounts";
      const data = JSON.parse(localStorage.getItem(key)) || [];

      const tbody = document.getElementById("mainTableBody");
      tbody.innerHTML = "";

      data.forEach(item => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${item.warehouse}</td>
          <td>${item.bin}</td>
          <td>${item.sku}</td>
          <td>${item.lot}</td>
          <td>${item.expiry}</td>
          <td>${item.qty}</td>
        `;

        tbody.appendChild(row);
      });
    }

    loadCompleted();
  </script>

</body>
</html>
