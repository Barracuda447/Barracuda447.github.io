<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receiving Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: rgb(0,0,0);
  color: rgb(255,224,0);
  padding: 20px;
}

h2 {
  text-align: center;
}

button {
  background: rgb(255,224,0);
  color: black;
  border: none;
  padding: 10px 12px;
  margin: 4px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  filter: brightness(0.9);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid rgb(255,224,0);
  padding: 10px;
  text-align: center;
}

th {
  background: rgb(255,224,0);
  color: black;
}

#pager {
  margin-top: 10px;
  text-align: center;
}

.hidden {
  display: none;
}

#detail {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>Receiving History</h2>

<div id="list"></div>

<div id="pager">
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<div id="detail" class="hidden">
  <h3 id="title"></h3>
  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>

const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8_SEEMLGeKrYaH0kxTaQLNZxhrDVB6tBSWpY4jSrq-mjaLkOFodq_RizYbESt5FOseq_4Y7goMsxz/pub?output=csv";

let data = [];
let receipts = [];

let page = 0;
const pageSize = 100;

// ----------------------
// COPY
// ----------------------
function copy(v) {
  navigator.clipboard.writeText(v || "");
}

// ----------------------
// LOAD CSV
// ----------------------
async function load() {

  const res = await fetch(SHEET_CSV_URL);
  const text = await res.text();

  const parsed = Papa.parse(text, {
    header: true,
    skipEmptyLines: true
  });

  data = parsed.data;

  buildReceipts();
}

load();

// ----------------------
// BUILD RECEIPTS
// ----------------------
function buildReceipts() {

  const map = {};

  data.forEach(r => {

    const po = (r.PO || "").trim();
    const session = (r.Session || "").trim();
    const ts = r.Timestamp;

    if (!po || !ts) return;

    const key = po + "|" + session + "|" + ts;

    if (!map[key]) {
      map[key] = {
        po,
        session,
        timestamp: ts,
        rows: []
      };
    }

    map[key].rows.push(r);
  });

  receipts = Object.values(map)
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  renderList();
}

// ----------------------
// PAGINATION
// ----------------------
function renderList() {

  const start = page * pageSize;
  const end = start + pageSize;

  const slice = receipts.slice(start, end);

  const div = document.getElementById("list");
  div.innerHTML = "";

  const table = document.createElement("table");

  table.innerHTML = `
    <thead>
      <tr>
        <th>PO</th>
        <th>Timestamp</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");

  slice.forEach(r => {

    const d = new Date(r.timestamp);

    const label = isNaN(d)
      ? r.timestamp
      : d.toLocaleString();

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.po}</td>
      <td>${label}</td>
      <td><button onclick='openReceipt(${JSON.stringify(r)})'>View</button></td>
    `;

    tbody.appendChild(tr);
  });

  div.appendChild(table);

  document.getElementById("pageInfo").innerText =
    `Page ${page + 1} / ${Math.ceil(receipts.length / pageSize)}`;
}

// ----------------------
// PAGERS
// ----------------------
function nextPage() {
  if ((page + 1) * pageSize < receipts.length) {
    page++;
    renderList();
  }
}

function prevPage() {
  if (page > 0) {
    page--;
    renderList();
  }
}

// ----------------------
// DETAIL VIEW
// ----------------------
function openReceipt(r) {

  document.getElementById("detail").classList.remove("hidden");

  document.getElementById("title").innerText =
    `PO ${r.po} — ${r.session}`;

  const rows = data.filter(x =>
    x.PO === r.po &&
    x.Session === r.session &&
    x.Timestamp === r.timestamp
  );

  const body = document.getElementById("body");
  body.innerHTML = "";

  rows.forEach(x => {

    body.innerHTML += `
      <tr>
        <td>${x.SKU}</td>
        <td>${x.Lot}</td>
        <td>${x["Expiration Date"]}</td>
        <td>${x["Received Qty"]}</td>
      </tr>
    `;
  });
}

</script>

</body>
</html>
