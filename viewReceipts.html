<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receiving Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: rgb(0,0,0);
  color: rgb(255,224,0);
  padding: 20px;
}

h2 { text-align: center; }

button {
  background: rgb(255,224,0);
  color: black;
  border: none;
  padding: 12px 14px;
  margin: 6px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover { filter: brightness(0.9); }

#receiptList {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid rgb(255,224,0);
  padding: 10px;
  text-align: center;
}

th {
  background: rgb(255,224,0);
  color: black;
}

.copyBtn {
  margin-left: 6px;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<h2>Receiving History</h2>

<div id="receiptList"></div>

<div id="detail" class="hidden">
  <h3 id="title"></h3>

  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR8_SEEMLGeKrYaH0kxTaQLNZxhrDVB6tBSWpY4jSrq-mjaLkOFodq_RizYbESt5FOseq_4Y7goMsxz/pub?output=csv";

const EXEC_URL =
"https://script.google.com/macros/s/AKfycbwgXASrYocJT51hLX2YlVlLTpvsRwJwJVtOvd4k1qxaWkA_O1D7kS4x_UQqvpIEVK0/exec";

let rawData = [];
let receipts = [];

// ======================
// COPY
// ======================
function copy(v){
  navigator.clipboard.writeText(v || "");
}

// ======================
// FORMAT TIME
// ======================
function formatReceiptTime(dateStr){
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let h=d.getHours();
  const m=String(d.getMinutes()).padStart(2,"0");
  const ampm=h>=12?"pm":"am";
  h=h%12||12;

  return `${months[d.getMonth()]} ${d.getDate()}, ${h}:${m}${ampm}`;
}

// ======================
// EXPIRY FORMAT
// ======================
function formatExpiry(dateStr){
  const d=new Date(dateStr);
  if(isNaN(d)) return dateStr;

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return `${String(d.getDate()).padStart(2,"0")}-${months[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
}

// ======================
// LOAD
// ======================
async function load(){
  const res=await fetch(SHEET_CSV_URL);
  const text=await res.text();

  const parsed=Papa.parse(text,{
    header:true,
    skipEmptyLines:true
  });

  rawData=parsed.data;
  buildReceipts();
}
load();

// ======================
// GROUP BY RECEIPT ID
// ======================
function buildReceipts(){

  const map={};

  rawData.forEach(r=>{

    const id=(r["Receipt ID"] || "").trim();
    if(!id) return;

    if(!map[id]){
      map[id]={
        receiptId:id,
        po:r.PO,
        timestamp:r.Timestamp,
        rows:[]
      };
    }

    map[id].rows.push(r);
  });

  receipts=Object.values(map)
    .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))
    .slice(0,10);

  renderButtons();
}

// ======================
// BUTTONS
// ======================
function renderButtons(){

  const div=document.getElementById("receiptList");
  div.innerHTML="";

  receipts.forEach(r=>{

    const wrapper=document.createElement("div");
    wrapper.style.display="flex";
    wrapper.style.gap="8px";
    wrapper.style.alignItems="center";

    const openBtn=document.createElement("button");
    openBtn.innerText=`${r.po} — ${formatReceiptTime(r.timestamp)}`;
    openBtn.onclick=()=>openReceipt(r);

    const delBtn=document.createElement("button");
    delBtn.innerText="Delete Receipt";
    delBtn.style.background="red";
    delBtn.style.color="white";

    delBtn.onclick=async()=>{

      if(!confirm("Delete entire receipt?")) return;

      try {
        // ✅ FIXED FOR GITHUB PAGES + APPS SCRIPT
        const res = await fetch(EXEC_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "deleteReceipt",
            receiptId: r.receiptId
          })
        });

        const text = await res.text();
        console.log("Delete response:", text);

        rawData = rawData.filter(x =>
          (x["Receipt ID"] || "") !== r.receiptId
        );

        buildReceipts();
        document.getElementById("detail").classList.add("hidden");

      } catch (err) {
        alert("Delete failed");
        console.error(err);
      }
    };

    wrapper.appendChild(openBtn);
    wrapper.appendChild(delBtn);
    div.appendChild(wrapper);
  });
}

// ======================
// CELL
// ======================
function cell(val){
  const safe=val??"";
  return `
    <div style="display:flex;justify-content:center;align-items:center;gap:6px;">
      <span>${safe}</span>
      <button class="copyBtn" onclick="copy('${String(safe).replace(/'/g,"\\'")}')">Copy</button>
    </div>
  `;
}

// ======================
// OPEN RECEIPT
// ======================
function openReceipt(r){

  document.getElementById("detail").classList.remove("hidden");

  document.getElementById("title").innerText =
    `${r.po} — ${formatReceiptTime(r.timestamp)}`;

  const body=document.getElementById("body");
  body.innerHTML="";

  r.rows.forEach(x=>{

    body.innerHTML+=`
      <tr>
        <td>${cell(x.SKU)}</td>
        <td>${cell(x.Lot)}</td>
        <td>${cell(formatExpiry(x["Expiration Date"]))}</td>
        <td>${cell(x["Received Qty"])}</td>
      </tr>
    `;
  });
}

</script>

</body>
</html>
