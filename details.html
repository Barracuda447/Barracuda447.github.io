<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Item Setup</title>

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e6e6;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --danger: #ff4d4d;
      --border: #2a2f3a;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h2 {
      margin-bottom: 16px;
      font-size: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    #questions p {
      font-size: 16px;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Yes/No buttons */
    #questions button {
      background: var(--accent);
      color: white;
    }

    #questions button:nth-child(even) {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .cancel {
      margin-top: 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Item Setup</h2>
    <div class="hint">Answer a few quick questions</div>

    <div class="card">

      <div id="questions">
        <p>Does this item have a barcode?</p>
        <button onclick="setBarcode(true)">Yes</button>
        <button onclick="setBarcode(false)">No</button>
      </div>

      <button class="cancel" onclick="goBack()">Cancel</button>

    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const warehouse = params.get("warehouse") || "";
    const bin = params.get("bin") || "";
    const sku = params.get("sku") || "";

    let hasBarcode = null;
    let hasLot = false;
    let hasExp = false;

    function setBarcode(answer) {
      hasBarcode = answer;

      if (hasBarcode) {
        goScan();
        return;
      }

      showLotQuestion();
    }

    function showLotQuestion() {
      document.getElementById("questions").innerHTML = `
        <p>Does this item have a LOT number?</p>
        <button onclick="setLot(true)">Yes</button>
        <button onclick="setLot(false)">No</button>
      `;
    }

    function setLot(answer) {
      hasLot = answer;
      showExpQuestion();
    }

    function showExpQuestion() {
      document.getElementById("questions").innerHTML = `
        <p>Does this item have an expiration date?</p>
        <button onclick="setExp(true)">Yes</button>
        <button onclick="setExp(false)">No</button>
      `;
    }

    function setExp(answer) {
      hasExp = answer;
      goManual();
    }

    function goScan() {
      window.location.href =
        "scan.html?warehouse=" + encodeURIComponent(warehouse) +
        "&bin=" + encodeURIComponent(bin) +
        "&sku=" + encodeURIComponent(sku);
    }

    function goManual() {
      window.location.href =
        "manual.html?warehouse=" + encodeURIComponent(warehouse) +
        "&bin=" + encodeURIComponent(bin) +
        "&sku=" + encodeURIComponent(sku) +
        "&lot=" + hasLot +
        "&exp=" + hasExp;
    }

    function goBack() {
      window.history.back();
    }
  </script>

</body>
</html>
