<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start Cycle</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            padding: 0;
            background: rgb(0,0,0);
            color: rgb(255,224,0);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        p {
            font-size: 20px;
            margin: 10px 0;
        }

        input {
            font-size: 22px;
            padding: 16px;
            margin: 14px 0;
            width: 90%;
            max-width: 420px;
            background: rgb(0,0,0);
            color: rgb(255,224,0);
            border: 2px solid rgb(255,224,0);
            border-radius: 8px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgb(255,224,0);
        }

        button {
            font-size: 26px;
            padding: 20px 40px;
            margin-top: 20px;
            cursor: pointer;
            background: rgb(0,0,0);
            color: rgb(255,224,0);
            border: 3px solid rgb(255,224,0);
            border-radius: 10px;
            touch-action: manipulation;
            min-width: 260px;
        }

        button:active {
            background: rgb(255,224,0);
            color: rgb(0,0,0);
        }

        button:hover {
            background: rgb(255,224,0);
            color: rgb(0,0,0);
        }

        #warehouseDisplay {
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>

<body>

<h2>Start New Cycle</h2>

<p><strong>Warehouse:</strong> <span id="warehouseDisplay"></span></p>

<input id="bin" placeholder="Enter Bin Location"><br>

<button onclick="startCycle()">Start Scanning</button>

<script>
const warehouse = localStorage.getItem("warehouse");

if (!warehouse) {
    window.location.href = "scannerTest.html";
}

document.getElementById("warehouseDisplay").innerText = warehouse;

function startCycle() {
    const bin = document.getElementById("bin").value.trim();
    if (!bin) return alert("Enter Bin Location");

    localStorage.setItem("bin", bin);

    const cycleId = "CYCLE-" + Date.now();
    localStorage.setItem("cycle", cycleId);

    window.location.href = "scannerScan.html";
}
</script>

</body>
</html>
