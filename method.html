<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Entry Method</title>
</head>
<body>

  <h2>Select Entry Method</h2>

  <div id="buttonContainer"></div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const lot = params.get("lot") === "true";
    const expiry = params.get("expiry") === "true";

    const container = document.getElementById("buttonContainer");

    if (lot && expiry) {
      container.innerHTML = `
        <button onclick="selectMethod('scan_both')">Scan LOT & EXPIRY</button>
        <br><br>
        <button onclick="selectMethod('manual')">ENTER MANUALLY</button>
      `;
    } else if (lot && !expiry) {
      container.innerHTML = `
        <button onclick="selectMethod('scan_lot')">Scan LOT</button>
        <br><br>
        <button onclick="selectMethod('manual')">ENTER MANUALLY</button>
      `;
    } else {
      container.innerHTML = `
        <button onclick="selectMethod('manual')">ENTER MANUALLY</button>
      `;
    }

    function selectMethod(method) {
      alert("Selected: " + method);
      // Next step will depend on this choice
    }
  </script>

</body>
</html>
