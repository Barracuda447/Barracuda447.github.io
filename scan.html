<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Item</title>

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e6e6;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: #2a2f3a;
      --success: #2ecc71;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 14px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    h2 {
      margin: 10px 0 12px;
      font-size: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: black;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .scan-btn {
      background: var(--accent);
      color: white;
    }

    .results-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Scan Item</h2>

    <div class="card">

      <video id="video" autoplay></video>

      <button class="scan-btn" onclick="scanNow()">SCAN</button>

      <p class="hint">
        Tap SCAN to capture barcode from camera
      </p>

      <div class="status">Camera active • Waiting for barcode</div>

      <button class="results-btn" onclick="goToResults()">View Results</button>

    </div>

  </div>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    const params = new URLSearchParams(window.location.search);

    const warehouse = params.get("warehouse") || "";
    const bin = params.get("bin") || "";
    const sku = params.get("sku") || "";

    let codeReader;
    let latestFrame = null;
    let scanning = false;

    let audioCtx;
    let audioReady = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      return audioCtx.resume().then(() => {
        audioReady = true;
      });
    }

    function beep() {
      if (!audioCtx || !audioReady) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.frequency.value = 900;
      gain.gain.value = 0.08;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function startCamera() {
      codeReader = new ZXing.BrowserMultiFormatReader();

      codeReader.decodeFromVideoDevice(null, "video", (result) => {
        if (result) {
          latestFrame = result.getText();
        }
      });
    }

    startCamera();

    function scanNow() {
      if (scanning) return;
      if (!latestFrame) return;

      scanning = true;

      initAudio().then(() => {
        handleScan(latestFrame);
      });

      setTimeout(() => {
        scanning = false;
      }, 500);
    }

    function parseBarcode(text) {
      let lot = "";
      let exp = "";

      if (!text) return { lot, exp };

      const clean = text
        .replace(/\u001d/g, "")
        .replace(/\s/g, "")
        .trim();

    //   let lotMatch = clean.match(/\(10\)([^\(]+)/);
    //   let expMatch = clean.match(/\(17\)(\d{6})/);

    //   if (!lotMatch) {
    //     lotMatch = clean.match(/(?:^|[^0-9])10([A-Za-z0-9\-]{1,20})17/);      }

    //   if (!expMatch) {
    //     expMatch = clean.match(/17(\d{6})/);
    //   }

      if (!lotMatch && clean.includes("10") && clean.includes("17")) {
        const split = clean.split("17");
        if (split[0].includes("10")) {
          lot = split[0].replace("10", "").trim();
        }
      } else if (lotMatch) {
        lot = lotMatch[1].trim();
      }

      if (expMatch) {
        exp = formatDate(expMatch[1]);
      }

      return { lot, exp };
    }

    function formatDate(raw) {
      if (!raw || raw.length !== 6) return "";
      return `20${raw.slice(0,2)}-${raw.slice(2,4)}-${raw.slice(4,6)}`;
    }

    function handleScan(text) {
      const { lot, exp } = parseBarcode(text);

      const key = "scanSession";
      let session = JSON.parse(sessionStorage.getItem(key)) || [];

      const existing = session.find(x =>
        x.warehouse === warehouse &&
        x.bin === bin &&
        x.sku === sku &&
        x.lot === lot &&
        x.exp === exp
      );

      if (existing) {
        existing.qty += 1;
      } else {
        session.push({
          warehouse,
          bin,
          sku,
          lot,
          exp,
          qty: 1
        });
      }

      sessionStorage.setItem(key, JSON.stringify(session));

      beep();
    }

    function goToResults() {
      window.location.href =
        "scanResults.html?warehouse=" + encodeURIComponent(warehouse) +
        "&bin=" + encodeURIComponent(bin) +
        "&sku=" + encodeURIComponent(sku);
    }
  </script>

</body>
</html>
