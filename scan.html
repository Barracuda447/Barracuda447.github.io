<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan Item</title>

  <style>
    video {
      width: 100%;
      max-width: 500px;
      border: 1px solid #ccc;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      background: #007BFF;
      color: white;
      border: none;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>Scan Item</h2>

  <video id="video" autoplay></video>

  <button onclick="scanNow()">SCAN</button>

  <p class="hint">
    Tap SCAN to capture barcode from camera
  </p>

  <button onclick="goToResults()">View Results</button>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    const params = new URLSearchParams(window.location.search);

    const warehouse = params.get("warehouse") || "";
    const bin = params.get("bin") || "";
    const sku = params.get("sku") || "";

    let codeReader;
    let latestFrame = null;
    let scanning = false;

    // =========================
    // AUDIO
    // =========================
    let audioCtx;
    let audioReady = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      return audioCtx.resume().then(() => {
        audioReady = true;
      });
    }

    function beep() {
      if (!audioCtx || !audioReady) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.frequency.value = 900;
      gain.gain.value = 0.08;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // =========================
    // CAMERA
    // =========================
    function startCamera() {
      codeReader = new ZXing.BrowserMultiFormatReader();

      codeReader.decodeFromVideoDevice(null, "video", (result) => {
        if (result) {
          latestFrame = result.getText();
        }
      });
    }

    startCamera();

    // =========================
    // SCAN BUTTON ONLY
    // =========================
    function scanNow() {
      if (scanning) return;
      if (!latestFrame) return;

      scanning = true;

      initAudio().then(() => {
        handleScan(latestFrame);
      });

      setTimeout(() => {
        scanning = false;
      }, 500);
    }

    // =========================
    // GS1 PARSER (SAFE)
    // =========================
    function parseBarcode(text) {
      let lot = "";
      let exp = "";

      if (!text) return { lot, exp };

      const clean = text
        .replace(/\u001d/g, "")
        .replace(/\s/g, "")
        .trim();

      let lotMatch = clean.match(/\(10\)([^\(]+)/);
      let expMatch = clean.match(/\(17\)(\d{6})/);

      if (!lotMatch) {
        lotMatch = clean.match(/10([A-Za-z0-9\-]{1,20})17/);
      }

      if (!expMatch) {
        expMatch = clean.match(/17(\d{6})/);
      }

      if (!lotMatch && clean.includes("10") && clean.includes("17")) {
        const split = clean.split("17");
        if (split[0].includes("10")) {
          lot = split[0].replace("10", "").trim();
        }
      } else if (lotMatch) {
        lot = lotMatch[1].trim();
      }

      if (expMatch) {
        exp = formatDate(expMatch[1]);
      }

      return { lot, exp };
    }

    function formatDate(raw) {
      if (!raw || raw.length !== 6) return "";
      return `20${raw.slice(0,2)}-${raw.slice(2,4)}-${raw.slice(4,6)}`;
    }

    // =========================
    // HANDLE SCAN (MERGE LOGIC)
    // =========================
    function handleScan(text) {
      const { lot, exp } = parseBarcode(text);

      const key = "scanSession";
      let session = JSON.parse(sessionStorage.getItem(key)) || [];

      const existing = session.find(x =>
        x.warehouse === warehouse &&
        x.bin === bin &&
        x.sku === sku &&
        x.lot === lot &&
        x.exp === exp
      );

      if (existing) {
        existing.qty += 1;
      } else {
        session.push({
          warehouse,
          bin,
          sku,
          lot,
          exp,
          qty: 1
        });
      }

      sessionStorage.setItem(key, JSON.stringify(session));

      beep();
    }

    function goToResults() {
      window.location.href =
        "scanResults.html?warehouse=" + encodeURIComponent(warehouse) +
        "&bin=" + encodeURIComponent(bin) +
        "&sku=" + encodeURIComponent(sku);
    }
  </script>

</body>
</html>
