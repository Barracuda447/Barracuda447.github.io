<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cycle Count</title>

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e6e6;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --success: #2ecc71;
      --border: #2a2f3a;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      padding: 14px;
      padding-bottom: 120px;
    }

    h2 {
      text-align: center;
      margin: 10px 0 14px;
      font-size: 18px;
      color: var(--text);
    }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      font-size: 14px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    #addItemBtn, #completeBtn {
      position: fixed;
      left: 0;
      width: 100%;
      padding: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: white;
    }

    #addItemBtn {
      bottom: 56px;
      background: var(--accent);
    }

    #completeBtn {
      bottom: 0;
      background: var(--success);
    }

    #addItemBtn:active,
    #completeBtn:active {
      transform: scale(0.99);
    }

    @media (max-width: 700px) {
      table {
        min-width: 100%;
      }

      th {
        display: none;
      }

      tr {
        display: block;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      td {
        display: flex;
        justify-content: space-between;
        border: none;
        padding: 8px 6px;
      }

      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }
    }
  </style>
</head>

<body>

  <h2 id="header"></h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>LOT</th>
          <th>Expiration Date</th>
          <th>On Hand</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <button id="addItemBtn" onclick="goToAddItem()">Add Item</button>
  <button id="completeBtn" onclick="completeCount()">Complete Count</button>

  <script>
    const params = new URLSearchParams(window.location.search);

    const warehouse = params.get("warehouse");
    const bin = params.get("bin");

    document.getElementById("header").innerText =
      "Warehouse: " + (warehouse || "ALL") + " | Bin: " + (bin || "ALL");

    function loadTable() {
      const key = "cycleCountData";
      const data = JSON.parse(localStorage.getItem(key)) || [];

      let filtered = data;

      if (warehouse && bin) {
        filtered = data.filter(item =>
          item.warehouse === warehouse &&
          item.bin === bin
        );
      }

      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      filtered.forEach(item => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td data-label="Item">${item.sku}</td>
          <td data-label="LOT">${item.lot || ""}</td>
          <td data-label="Expiry">${item.expiry || ""}</td>
          <td data-label="On Hand">${item.qty}</td>
        `;

        tbody.appendChild(row);
      });
    }

    function goToAddItem() {
      window.location.href =
        "item.html?warehouse=" + encodeURIComponent(warehouse || "") +
        "&bin=" + encodeURIComponent(bin || "");
    }

    // =========================
    // FIXED FUNCTION ONLY
    // =========================
    function completeCount() {
      const key = "cycleCountData";
      const completedKey = "completedCounts";

      const data = JSON.parse(localStorage.getItem(key)) || [];
      const completed = JSON.parse(localStorage.getItem(completedKey)) || [];

      let thisCount = data;

      if (warehouse && bin) {
        thisCount = data.filter(item =>
          item.warehouse === warehouse &&
          item.bin === bin
        );
      }

      thisCount.forEach(item => {
        completed.push(item);
      });

      localStorage.setItem(completedKey, JSON.stringify(completed));

      const remaining = data.filter(item =>
        !(item.warehouse === warehouse && item.bin === bin)
      );

      localStorage.setItem(key, JSON.stringify(remaining));

      window.location.href = "index.html";
    }

    loadTable();
  </script>

</body>
</html>
