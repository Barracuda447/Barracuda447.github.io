<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bin Review</title>

<style>
body { font-family: Arial; }

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background: #f2f2f2;
}

button {
    margin: 5px;
    padding: 8px 12px;
    cursor: pointer;
}

#status {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Bin Review</h2>

<table>
<thead>
<tr>
    <th>Timestamp</th>
    <th>Cycle</th>
    <th>Warehouse</th>
    <th>Bin</th>
    <th>SKU</th>
    <th>Lot</th>
    <th>Expiration Date</th>
    <th>On Hand</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="reviewBody"></tbody>
</table>

<button onclick="sendCycleToSheet()">Send Cycle to Google Sheet</button>
<button onclick="finish()">Finish</button>

<div id="status"></div>

<script>

// =========================
// LOAD DATA
// =========================
let data = JSON.parse(localStorage.getItem("reviewData") || "[]");
const tbody = document.getElementById("reviewBody");
const status = document.getElementById("status");

// 👉 PUT YOUR GOOGLE APPS SCRIPT URL HERE
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzzujRdB2K3bbXUh4jq-ePIE7BpaPznvL-Al7WEAzqpvtG2HAcRU8n2BvreN6yB7NZQsQ/exec";

// =========================
// RENDER TABLE
// =========================
function render() {
    tbody.innerHTML = '';

    data.forEach((row, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.timestamp}</td>
            <td>${row.cycle}</td>
            <td>${row.warehouse}</td>
            <td>${row.bin}</td>
            <td>${row.sku}</td>
            <td>${row.lot}</td>
            <td>${row.exp}</td>
            <td>${row.qty}</td>
            <td>
                <button onclick="deleteRow(${index})">Delete</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// =========================
// DELETE ROW
// =========================
function deleteRow(i) {
    if (!confirm("Delete this row?")) return;

    data.splice(i, 1);
    localStorage.setItem("reviewData", JSON.stringify(data));
    render();
}

// =========================
// SEND FULL CYCLE TO SHEET
// =========================
async function sendCycleToSheet() {
    if (!data.length) {
        alert("No data to send.");
        return;
    }

    status.innerText = "Sending to Google Sheet...";

    try {
        for (let item of data) {
            await fetch(SHEET_URL, {
                method: "POST",
                body: JSON.stringify(item),
                headers: {
                    "Content-Type": "application/json"
                }
            });
        }

        status.innerText = "✅ Successfully sent to Google Sheet!";
    } catch (err) {
        console.log(err);
        status.innerText = "❌ Error sending data.";
    }
}

// =========================
// FINISH CYCLE
// =========================
function finish() {
    alert("Bin finalized.");
    localStorage.removeItem("reviewData");
    window.location.href = "cycle.html";
}

// initial render
render();

</script>

</body>
</html>
