<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bin Review</title>

<style>
body {
    font-family: Arial;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    margin: 0;
    padding: 12px;
}

h2 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
    font-size: 16px;
}

th, td {
    border: 1px solid rgb(255,224,0);
    padding: 10px;
    text-align: center;
    color: rgb(255,224,0);
}

th {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
    font-weight: bold;
}

button {
    margin: 6px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 18px;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 8px;
    touch-action: manipulation;
}

button:active {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
}

button:hover {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
}

#status {
    margin-top: 12px;
    font-weight: bold;
    text-align: center;
    font-size: 18px;
    min-height: 24px;
}

table button {
    padding: 8px 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Bin Review</h2>

<table>
<thead>
<tr>
    <th>Timestamp</th>
    <th>Cycle</th>
    <th>Warehouse</th>
    <th>Bin</th>
    <th>SKU</th>
    <th>Lot</th>
    <th>Expiration Date</th>
    <th>On Hand</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="reviewBody"></tbody>
</table>

<button onclick="sendCycleToSheet()">Send Cycle to Google Sheet</button>
<button onclick="finish()">Finish</button>

<div id="status"></div>

<script>

// =========================
// LOAD DATA
// =========================
let data = JSON.parse(localStorage.getItem("reviewData") || "[]");
const tbody = document.getElementById("reviewBody");
const status = document.getElementById("status");

// 👉 PUT YOUR GOOGLE APPS SCRIPT URL HERE
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzzujRdB2K3bbXUh4jq-ePIE7BpaPznvL-Al7WEAzqpvtG2HAcRU8n2BvreN6yB7NZQsQ/exec";

// =========================
// RENDER TABLE
// =========================
function render() {
    tbody.innerHTML = '';

    data.forEach((row, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.timestamp}</td>
            <td>${row.cycle}</td>
            <td>${row.warehouse}</td>
            <td>${row.bin}</td>
            <td>${row.sku}</td>
            <td>${row.lot}</td>
            <td>${row.exp}</td>
            <td>${row.qty}</td>
            <td>
                <button onclick="deleteRow(${index})">Delete</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// =========================
// DELETE ROW
// =========================
function deleteRow(i) {
    if (!confirm("Delete this row?")) return;

    data.splice(i, 1);
    localStorage.setItem("reviewData", JSON.stringify(data));
    render();
}

// =========================
// SEND FULL CYCLE TO SHEET
// =========================
async function sendCycleToSheet() {
    if (!data.length) {
        alert("No data to send.");
        return;
    }

    status.innerText = "Sending to Google Sheet...";

    try {
        for (let item of data) {

            await fetch(SHEET_URL, {
                method: "POST",
                body: JSON.stringify(item),
                mode: "no-cors",
                headers: {
                    "Content-Type": "text/plain"
                }
            });

        }

        status.innerText = "✅ Sent to sheet";
    } catch (err) {
        console.log(err);
        status.innerText = "❌ Network error sending data.";
    }
}

// =========================
// FINISH CYCLE
// =========================
function finish() {
    alert("Bin finalized.");
    localStorage.removeItem("reviewData");
    window.location.href = "cycle.html";
}

// initial render
render();

</script>

</body>
</html>
