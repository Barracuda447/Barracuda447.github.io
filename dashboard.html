<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Baseline Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            color: #666;
            font-weight: 500;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(244, 67, 54, 0.3);
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            display: block;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn-secondary:disabled {
            background: #dee2e6;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .file-info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info strong {
            color: #1976D2;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 30px;
            display: none;
        }

        .table-container.show {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-top: 3px solid #667eea;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .saved-files {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .saved-files h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: white;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .file-item-name {
            font-weight: 500;
            color: #333;
            cursor: pointer;
        }

        .file-item-name:hover {
            color: #667eea;
        }

        .file-item-date {
            color: #999;
            font-size: 0.85em;
        }

        .file-item-actions {
            display: flex;
            gap: 10px;
        }

        .file-item-actions button {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .btn-load {
            background: #2196F3;
            color: white;
        }

        .btn-load:hover {
            background: #0b7dda;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .user-info {
                width: 100%;
                justify-content: center;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 10px;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📊 Inventory Baseline</div>
        <div class="user-info">
            <div class="user-name" id="userName"></div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h1>Your Inventory Files</h1>
        <p class="subtitle">Upload and manage your Excel inventory files</p>

        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>

        <div class="upload-section" id="uploadSection">
            <label for="fileInput" class="upload-label">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-hint">Excel files (.xlsx, .xls, .csv)</div>
            </label>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
        </div>

        <div class="button-group">
            <button class="btn-primary" id="uploadButton">Choose File</button>
        </div>

        <div id="savedFilesSection" class="saved-files" style="display: none;">
            <h3>📂 Your Saved Files</h3>
            <ul id="savedFilesList" class="file-list"></ul>
        </div>

        <div id="fileInfo" class="file-info">
            <strong>Loaded File:</strong> <span id="fileName"></span>
        </div>

        <div id="stats" class="stats"></div>

        <div id="tableContainer" class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="headerRow"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // REPLACE THE firebaseConfig BELOW WITH YOUR OWN CONFIG FROM FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // Check authentication on page load
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;

            // Get user profile from Firestore
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                document.getElementById('userName').textContent = `Welcome, ${userDoc.data().name}!`;
            } else {
                document.getElementById('userName').textContent = `Welcome, ${user.email}!`;
            }

            // Load saved files
            loadSavedFiles();
        });

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = 'index.html';
        });

        // File handling
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const uploadSection = document.getElementById('uploadSection');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const tableContainer = document.getElementById('tableContainer');
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');
        const statsContainer = document.getElementById('stats');
        const savedFilesSection = document.getElementById('savedFilesSection');
        const savedFilesList = document.getElementById('savedFilesList');

        // Upload button click
        uploadButton.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.background = '#f0f2ff';
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.style.background = '#f8f9fa';
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.background = '#f8f9fa';
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });

        async function handleFileSelect() {
            const file = fileInput.files[0];
            
            if (!file || !currentUser) return;

            hideMessages();

            try {
                const reader = new FileReader();
                
                reader.onload = async (e) => {
                    try {
                        const data = e.target.result;
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        if (workbook.SheetNames.length === 0) {
                            showError('No sheets found in the file.');
                            return;
                        }

                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        if (jsonData.length === 0) {
                            showError('The file is empty or could not be read.');
                            return;
                        }

                        displayData(jsonData, file.name);
                        
                        // Save file to Firestore
                        await db.collection('users').doc(currentUser.uid).collection('files').doc(file.name).set({
                            name: file.name,
                            data: jsonData,
                            savedAt: new Date().toISOString()
                        });
                        
                        showSuccess(`Successfully loaded and saved "${file.name}"`);
                        fileInput.value = '';
                        loadSavedFiles();
                    } catch (error) {
                        showError(`Error processing file: ${error.message}`);
                    }
                };

                reader.onerror = () => {
                    showError('Error reading the file. Please try again.');
                };

                reader.readAsArrayBuffer(file);
            } catch (error) {
                showError(`Error: ${error.message}`);
            }
        }

        function displayData(data, name) {
            headerRow.innerHTML = '';
            tableBody.innerHTML = '';
            statsContainer.innerHTML = '';

            const headers = data[0] || [];

            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header || 'Column';
                headerRow.appendChild(th);
            });

            let rowCount = 0;
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.every(cell => !cell)) continue;

                const tr = document.createElement('tr');
                headers.forEach((header, index) => {
                    const td = document.createElement('td');
                    td.textContent = row[index] || '';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
                rowCount++;
            }

            fileName.textContent = name;
            fileInfo.classList.add('show');

            const statHTML = `
                <div class="stat-card">
                    <div class="stat-value">${headers.length}</div>
                    <div class="stat-label">Columns</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${rowCount}</div>
                    <div class="stat-label">Rows</div>
                </div>
            `;
            statsContainer.innerHTML = statHTML;

            tableContainer.classList.add('show');
        }

        async function loadSavedFiles() {
            if (!currentUser) return;

            const snapshot = await db.collection('users').doc(currentUser.uid).collection('files').orderBy('savedAt', 'desc').get();
            const files = [];

            snapshot.forEach(doc => {
                files.push(doc.data());
            });
            
            if (files.length === 0) {
                savedFilesSection.style.display = 'none';
                return;
            }

            savedFilesList.innerHTML = '';
            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                
                const dateObj = new Date(file.savedAt);
                const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString();
                
                li.innerHTML = `
                    <div>
                        <div class="file-item-name">${file.name}</div>
                        <div class="file-item-date">Saved: ${dateStr}</div>
                    </div>
                    <div class="file-item-actions">
                        <button class="btn-load" onclick="loadFile('${file.name}')">Load</button>
                        <button class="btn-delete" onclick="deleteFile('${file.name}')">Delete</button>
                    </div>
                `;
                
                savedFilesList.appendChild(li);
            });

            savedFilesSection.style.display = 'block';
        }

        async function loadFile(fname) {
            if (!currentUser) return;

            const doc = await db.collection('users').doc(currentUser.uid).collection('files').doc(fname).get();
            if (doc.exists) {
                const file = doc.data();
                displayData(file.data, fname);
                fileName.textContent = fname;
                fileInfo.classList.add('show');
                showSuccess(`Loaded "${fname}"`);
            }
        }

        async function deleteFile(fname) {
            if (!currentUser) return;

            if (confirm(`Delete "${fname}"?`)) {
                await db.collection('users').doc(currentUser.uid).collection('files').doc(fname).delete();
                loadSavedFiles();
                showSuccess(`Deleted "${fname}"`);
                tableContainer.classList.remove('show');
                fileInfo.classList.remove('show');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 5000);
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }
    </script>
</body>
</html>
