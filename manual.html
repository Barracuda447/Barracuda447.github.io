<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manual Entry</title>
</head>
<body>

  <h2>Manual Entry</h2>

  <p id="info"></p>

  <div id="lotSection">
    <label>LOT:</label>
    <input type="text" id="lotInput">
  </div>

  <br>

  <div id="expirySection">
    <label>Expiration Date:</label>
    <input type="date" id="expiryInput">
  </div>

  <br>

  <div>
    <label>On Hand Quantity:</label>
    <input type="number" id="qtyInput" min="0">
  </div>

  <br>

  <button onclick="save()">Save Item</button>
  <button onclick="cancel()">Cancel</button>

  <script>
    const params = new URLSearchParams(window.location.search);

    const warehouse = params.get("warehouse") || "";
    const bin = params.get("bin") || "";
    const sku = params.get("sku") || "";

    const hasLot = params.get("lot") === "true";
    const hasExp = params.get("exp") === "true";

    document.getElementById("info").innerText =
      "SKU: " + sku + " | Warehouse: " + warehouse + " | Bin: " + bin;

    document.getElementById("lotSection").style.display = hasLot ? "block" : "none";
    document.getElementById("expirySection").style.display = hasExp ? "block" : "none";

    function save() {
      const qty = parseInt(document.getElementById("qtyInput").value, 10);

      if (!qty || qty <= 0) {
        alert("Enter valid quantity");
        return;
      }

      const lot = hasLot ? document.getElementById("lotInput").value.trim() : "";
      const expiry = hasExp ? document.getElementById("expiryInput").value : "";

      const key = "cycleCountData";
      let data = JSON.parse(localStorage.getItem(key)) || [];

      const existing = data.find(item =>
        item.warehouse === warehouse &&
        item.bin === bin &&
        item.sku === sku &&
        item.lot === lot &&
        item.expiry === expiry
      );

      if (existing) {
        existing.qty += qty;
      } else {
        data.push({
          warehouse,
          bin,
          sku,
          lot,
          expiry,
          qty
        });
      }

      localStorage.setItem(key, JSON.stringify(data));

      window.location.href =
        "count.html?warehouse=" + encodeURIComponent(warehouse) +
        "&bin=" + encodeURIComponent(bin);
    }

    function cancel() {
      window.history.back();
    }
  </script>

</body>
</html>
