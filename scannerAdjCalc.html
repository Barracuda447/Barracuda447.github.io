<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<h2>Scanner Adjustment Calculator</h2>

<button onclick="startNewAdjustment()">New Adjustment</button>

<div id="uploadSection" style="display:none; margin-top:15px;">
  <label>Upload NetSuite Export:</label>
  <input type="file" id="fileInput" />
</div>

<div id="binDateSelector" style="display:none; margin-top:20px;">
  <h3>Select Cycle Count Batch</h3>
  <div id="options"></div>
</div>

<h3>Sheet Status</h3>
<div id="status" style="font-weight:bold;"></div>

<h4>Raw Cycle Sheet Preview (Debug)</h4>
<table border="1" id="debugTable">
  <thead></thead>
  <tbody></tbody>
</table>

<h3>Results</h3>
<table border="1" id="resultTable">
  <thead>
    <tr>
      <th>Item</th>
      <th>Lot</th>
      <th>Expiration</th>
      <th>Bin</th>
      <th>Adjustment</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

// 🔹 Google Sheet CSV (cycle counts)
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9buyeY2V9qHg10FJJ3JbuyV-o8xvbF2QEGSLgX-3cIdgwR7fDJoY_BLiiAOQYCUHv0qcQ3fMLVDv-/pub?output=csv";

let netSuiteData = [];
let cycleData = [];

// -------------------------
// HELPERS
// -------------------------
function clean(v) {
  return (v || "").toString().trim();
}

function normalizeDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

// -------------------------
// START
// -------------------------
function startNewAdjustment() {
  document.getElementById("uploadSection").style.display = "block";
  loadCycleDataAndShowOptions();
}

// -------------------------
// NETSUITE UPLOAD (FIXED TSV/CSV AUTO DETECT)
// -------------------------
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    delimiter: "", // auto-detect CSV or TSV
    complete: function(results) {
      netSuiteData = results.data;
      console.log("NetSuite:", netSuiteData);
      alert("NetSuite file loaded");
    }
  });
});

// -------------------------
// LOAD GOOGLE SHEET
// -------------------------
async function loadCycleData() {
  const statusEl = document.getElementById("status");
  const thead = document.querySelector("#debugTable thead");
  const tbody = document.querySelector("#debugTable tbody");

  try {
    statusEl.innerText = "Loading Google Sheet...";
    statusEl.style.color = "orange";

    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const parsed = Papa.parse(text.trim(), {
      header: true,
      skipEmptyLines: true,
      transformHeader: h => h.trim()
    });

    cycleData = parsed.data;

    statusEl.innerText = "Google Sheet Loaded ✔";
    statusEl.style.color = "green";

    const headers = parsed.meta.fields;

    thead.innerHTML = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

    tbody.innerHTML = "";
    cycleData.slice(0, 10).forEach(row => {
      tbody.innerHTML += "<tr>" +
        headers.map(h => `<td>${row[h] || ""}</td>`).join("") +
      "</tr>";
    });

  } catch (err) {
    statusEl.innerText = "ERROR: " + err.message;
    statusEl.style.color = "red";
  }
}

// -------------------------
// BUILD BATCH LIST
// -------------------------
async function loadCycleDataAndShowOptions() {
  await loadCycleData();

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normalizeDate(r["Timestamp"]);

    if (!bin || !date) return;

    map[`${date}|${bin}`] = true;
  });

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  Object.keys(map).sort().forEach(key => {
    const [date, bin] = key.split("|");

    const d = new Date(date + "T00:00:00");
    const pretty = d.toLocaleDateString(undefined, {
      month: "long",
      day: "numeric"
    });

    const btn = document.createElement("button");
    btn.innerText = `${pretty}, Bin ${bin}`;
    btn.style.margin = "5px";

    btn.onclick = () => runAdjustment(bin, date);

    optionsDiv.appendChild(btn);
  });

  document.getElementById("binDateSelector").style.display = "block";
}

// -------------------------
// MAIN CALCULATION
// -------------------------
function runAdjustment(bin, date) {

  const ccFiltered = cycleData.filter(r =>
    clean(r["Bin"]) === bin &&
    normalizeDate(r["Timestamp"]) === date
  );

  const nsFiltered = netSuiteData.filter(r =>
    clean(r["Bin Number"]) === bin
  );

  let nsMap = {};
  nsFiltered.forEach(r => {
    const key = [
      clean(r["Item"]),
      clean(r["LOT"]),
      normalizeDate(r["Expiration Date"]),
      clean(r["Bin Number"])
    ].join("|");

    nsMap[key] = parseFloat(r["On Hand"] || 0);
  });

  let ccMap = {};
  ccFiltered.forEach(r => {
    const key = [
      clean(r["SKU"]),
      clean(r["Lot"]),
      normalizeDate(r["Expiration Date"]),
      clean(r["Bin"])
    ].join("|");

    ccMap[key] = parseFloat(r["On Hand"] || 0);
  });

  const allKeys = new Set([...Object.keys(nsMap), ...Object.keys(ccMap)]);

  const rows = Array.from(allKeys).map(key => {
    const [item, lot, exp, binKey] = key.split("|");

    const systemQty = nsMap[key] || 0;
    const countedQty = ccMap[key] || 0;

    const adjustment = countedQty - systemQty;

    return {
      item,
      lot,
      exp,
      bin: binKey,
      adjustment
    };
  });

  rows.sort((a, b) =>
    a.item.localeCompare(b.item, undefined, { numeric: true }) ||
    a.lot.localeCompare(b.lot)
  );

  const tbody = document.querySelector("#resultTable tbody");
  tbody.innerHTML = "";

  rows.forEach(r => {
    if (r.adjustment !== 0) {
      tbody.innerHTML += `
        <tr>
          <td>${r.item}</td>
          <td>${r.lot}</td>
          <td>${r.exp}</td>
          <td>${r.bin}</td>
          <td>${r.adjustment > 0 ? "+" : ""}${r.adjustment}</td>
        </tr>
      `;
    }
  });
}

</script>

</body>
</html>
