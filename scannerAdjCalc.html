<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Wizard</title>

  <!-- Google Sheet CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- XLS/XLSX parser (CRITICAL FIX) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>Scanner Adjustment Wizard</h2>

<button onclick="startFlow()">Create New Adjustment</button>

<div id="step1" style="display:none;">
  <h3>Loading Google Sheet...</h3>
  <div id="status"></div>
</div>

<div id="step2" style="display:none;">
  <h3>Upload NetSuite XLS/XLSX Export</h3>
  <input type="file" id="fileInput" accept=".xls,.xlsx">
</div>

<div id="step3" style="display:none;">
  <h3>Select Cycle Batch</h3>
  <div id="batchOptions"></div>
</div>

<div id="step4" style="display:none;">
  <h3>Adjustment Results</h3>

  <table border="1">
    <thead>
      <tr>
        <th>Item</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Bin</th>
        <th>Adjustment</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

<script>

// =====================
// DATA STORAGE
// =====================
let cycleData = [];
let netSuiteData = [];
let selectedBin = "";
let selectedDate = "";

// =====================
// HELPERS
// =====================
function clean(v){
  return (v || "").toString().trim().toUpperCase();
}

function num(v){
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

// Normalize BOTH formats:
// NetSuite: 30-4-27
// Google: 2027-04-30
function normDate(v){
  if (!v) return "";

  const s = v.toString().trim();

  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  const parts = s.split("-");
  if (parts.length === 3 && parts[0].length <= 2) {
    const d = parts[0].padStart(2,"0");
    const m = parts[1].padStart(2,"0");
    const y = "20" + parts[2];
    return `${y}-${m}-${d}`;
  }

  const dt = new Date(s);
  if (isNaN(dt)) return "";
  return dt.toISOString().split("T")[0];
}

function key(item, lot, exp, bin){
  return [
    clean(item),
    clean(lot),
    normDate(exp),
    clean(bin)
  ].join("|");
}

// =====================
// START FLOW
// =====================
function startFlow(){
  document.getElementById("step1").style.display = "block";
  loadGoogleSheet();
}

// =====================
// STEP 1 - GOOGLE SHEET
// =====================
async function loadGoogleSheet(){

  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9buyeY2V9qHg10FJJ3JbuyV-o8xvbF2QEGSLgX-3cIdgwR7fDJoY_BLiiAOQYCUHv0qcQ3fMLVDv-/pub?output=csv");
  const text = await res.text();

  const parsed = Papa.parse(text.trim(), {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });

  cycleData = parsed.data;

  document.getElementById("status").innerText = "Google Sheet Loaded ✔";

  document.getElementById("step2").style.display = "block";
}

// =====================
// STEP 2 - NETSUITE XLS/XLSX (FIXED)
// =====================
document.getElementById("fileInput").addEventListener("change", e => {

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){

    const data = new Uint8Array(evt.target.result);

    const workbook = XLSX.read(data, { type: "array" });

    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];

    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    console.log("RAW NETSUITE SAMPLE:", json[0]);

    // Normalize NetSuite columns
    netSuiteData = json.map(r => ({
      Item: r["Item"],
      Lot: r["LOT"],
      Expiration: r["Expiration Date"],
      Bin: r["Bin Number"],
      OnHand: r["On Hand"],
      Available: r["Available"]
    }));

    buildBatchOptions();
    document.getElementById("step3").style.display = "block";
  };

  reader.readAsArrayBuffer(file);
});

// =====================
// STEP 3 - BATCH OPTIONS
// =====================
function buildBatchOptions(){

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normDate(r["Timestamp"]);

    if (!bin || !date) return;

    map[`${date}|${bin}`] = true;
  });

  const div = document.getElementById("batchOptions");
  div.innerHTML = "";

  Object.keys(map).forEach(k => {

    const [date, bin] = k.split("|");

    const d = new Date(date + "T00:00:00");

    const label = d.toLocaleDateString(undefined,{
      month:"long",
      day:"numeric"
    });

    const btn = document.createElement("button");
    btn.innerText = `${label}, Bin ${bin}`;

    btn.onclick = () => {
      selectedBin = bin;
      selectedDate = date;
      runCalculation();
    };

    div.appendChild(btn);
  });
}

// =====================
// STEP 4 - LEDGER (NOW RELIABLE)
// =====================
function runCalculation(){

  const ledger = {};

  // ------------------
  // NETSUITE (-)
  // ------------------
  netSuiteData
    .filter(r => clean(r.Bin) === selectedBin)
    .forEach(r => {

      const k = key(
        r.Item,
        r.Lot,
        r.Expiration,
        r.Bin
      );

      ledger[k] = (ledger[k] || 0) - num(r.OnHand);
    });

  // ------------------
  // CYCLE (+)
  // ------------------
  cycleData
    .filter(r =>
      clean(r["Bin"]) === selectedBin &&
      normDate(r["Timestamp"]) === selectedDate
    )
    .forEach(r => {

      const k = key(
        r["SKU"],
        r["Lot"],
        r["Expiration Date"],
        r["Bin"]
      );

      ledger[k] = (ledger[k] || 0) + num(r["On Hand"]);
    });

  // ------------------
  // OUTPUT
  // ------------------
  const rows = Object.entries(ledger).map(([k,v])=>{
    const [item,lot,exp,bin] = k.split("|");
    return {item,lot,exp,bin,adj:v};
  });

  rows.sort((a,b)=>
    a.item.localeCompare(b.item,undefined,{numeric:true}) ||
    a.lot.localeCompare(b.lot)
  );

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${r.item}</td>
        <td>${r.lot}</td>
        <td>${r.exp}</td>
        <td>${r.bin}</td>
        <td>${r.adj>0?"+":""}${r.adj}</td>
      </tr>`;
  });

  document.getElementById("step4").style.display = "block";
}

</script>

</body>
</html>
