<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<h2>Scanner Adjustment Calculator</h2>

<button onclick="startFlow()">Create New Adjustment</button>

<!-- STEP 1 -->
<div id="step1" style="display:none;">
  <h3>Step 1: Loading Google Sheet...</h3>
  <div id="status"></div>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
  <h3>Step 2: Upload NetSuite Export</h3>
  <input type="file" id="fileInput">
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
  <h3>Step 3: Select Cycle Batch</h3>
  <div id="batchOptions"></div>
</div>

<!-- STEP 4 -->
<div id="step4" style="display:none;">
  <h3>Step 4: Adjustments</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Item</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Bin</th>
        <th>Adjustment</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

<script>

// =====================
// DATA
// =====================
let cycleData = [];
let netSuiteData = [];
let selectedBin = "";
let selectedDate = "";

// =====================
// HELPERS (CRITICAL FIX AREA)
// =====================
function clean(v){
  return (v || "").toString().trim().toUpperCase();
}

function num(v){
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

// Normalize BOTH formats:
// - NetSuite: 30-4-27
// - Google: 2027-04-30
function normDate(v){

  if (!v) return "";

  const s = v.toString().trim();

  // already ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // NetSuite format dd-mm-yy
  const parts = s.split("-");
  if (parts.length === 3 && parts[0].length <= 2) {
    let d = parts[0].padStart(2,"0");
    let m = parts[1].padStart(2,"0");
    let y = "20" + parts[2];
    return `${y}-${m}-${d}`;
  }

  const d = new Date(s);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

// Unified key builder (MOST IMPORTANT PART)
function makeKey(item, lot, exp, bin){
  return [
    clean(item),
    clean(lot),
    normDate(exp),
    clean(bin)
  ].join("|");
}

// =====================
// FLOW START
// =====================
function startFlow(){
  document.getElementById("step1").style.display = "block";
  loadGoogleSheet();
}

// =====================
// STEP 1 - GOOGLE SHEET
// =====================
async function loadGoogleSheet(){

  const status = document.getElementById("status");

  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9buyeY2V9qHg10FJJ3JbuyV-o8xvbF2QEGSLgX-3cIdgwR7fDJoY_BLiiAOQYCUHv0qcQ3fMLVDv-/pub?output=csv");
  const text = await res.text();

  const parsed = Papa.parse(text.trim(), {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });

  cycleData = parsed.data;

  status.innerText = "Google Sheet Loaded ✔";

  document.getElementById("step2").style.display = "block";
}

// =====================
// STEP 2 - NETSUITE FILE
// =====================
document.getElementById("fileInput").addEventListener("change", e => {

  Papa.parse(e.target.files[0], {
    header: true,
    skipEmptyLines: true,
    delimiter: "",
    transformHeader: h => h.trim(),
    complete: r => {

      netSuiteData = r.data;

      buildBatchOptions();

      document.getElementById("step3").style.display = "block";
    }
  });
});

// =====================
// STEP 3 - BATCH LIST
// =====================
function buildBatchOptions(){

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normDate(r["Timestamp"]);

    if (!bin || !date) return;

    map[`${date}|${bin}`] = true;
  });

  const div = document.getElementById("batchOptions");
  div.innerHTML = "";

  Object.keys(map).forEach(k => {

    const [date, bin] = k.split("|");

    const d = new Date(date + "T00:00:00");

    const label = d.toLocaleDateString(undefined,{
      month:"long",
      day:"numeric"
    });

    const btn = document.createElement("button");
    btn.innerText = `${label}, Bin ${bin}`;

    btn.onclick = () => {
      selectedBin = bin;
      selectedDate = date;
      runCalculation();
    };

    div.appendChild(btn);
  });
}

// =====================
// STEP 4 - CORE LEDGER
// =====================
function runCalculation(){

  const ledger = {};

  // -------------------
  // NETSUITE (- SIDE)
  // -------------------
  netSuiteData
    .filter(r => clean(r["Bin Number"]) === selectedBin)
    .forEach(r => {

      const k = makeKey(
        r["Item"],
        r["LOT"],
        r["Expiration Date"],
        r["Bin Number"]
      );

      ledger[k] = (ledger[k] || 0) - num(r["On Hand"]);
    });

  // -------------------
  // CYCLE (+ SIDE)
  // -------------------
  cycleData
    .filter(r =>
      clean(r["Bin"]) === selectedBin &&
      normDate(r["Timestamp"]) === selectedDate
    )
    .forEach(r => {

      const k = makeKey(
        r["SKU"],
        r["Lot"],
        r["Expiration Date"],
        r["Bin"]
      );

      ledger[k] = (ledger[k] || 0) + num(r["On Hand"]);
    });

  // -------------------
  // OUTPUT
  // -------------------
  const rows = Object.entries(ledger).map(([k,v])=>{
    const [item,lot,exp,bin] = k.split("|");
    return {item,lot,exp,bin,adj:v};
  });

  rows.sort((a,b)=>
    a.item.localeCompare(b.item,undefined,{numeric:true}) ||
    a.lot.localeCompare(b.lot)
  );

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${r.item}</td>
        <td>${r.lot}</td>
        <td>${r.exp}</td>
        <td>${r.bin}</td>
        <td>${r.adj>0?"+":""}${r.adj}</td>
      </tr>`;
  });

  document.getElementById("step4").style.display = "block";
}

</script>

</body>
</html>
