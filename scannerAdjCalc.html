<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<h2>Scanner Adjustment Calculator</h2>

<button onclick="startNewAdjustment()">New Adjustment</button>

<div id="uploadSection" style="display:none; margin-top:15px;">
  <label>Upload NetSuite Export:</label>
  <input type="file" id="fileInput" />
</div>

<div id="binDateSelector" style="display:none; margin-top:20px;">
  <h3>Select Cycle Count Batch</h3>
  <div id="options"></div>
</div>

<h3>Status</h3>
<div id="status"></div>

<h3>Results</h3>
<table border="1" id="resultTable">
  <thead>
    <tr>
      <th>Item</th>
      <th>Lot</th>
      <th>Expiration</th>
      <th>Bin</th>
      <th>Adjustment</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9buyeY2V9qHg10FJJ3JbuyV-o8xvbF2QEGSLgX-3cIdgwR7fDJoY_BLiiAOQYCUHv0qcQ3fMLVDv-/pub?output=csv";

let netSuiteData = [];
let cycleData = [];

function clean(v) {
  return (v || "").toString().trim();
}

function normDate(v) {
  const d = new Date(v);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

// -------------------------
function startNewAdjustment() {
  document.getElementById("uploadSection").style.display = "block";
  loadCycleDataAndShowOptions();
}

// -------------------------
document.getElementById("fileInput").addEventListener("change", e => {
  Papa.parse(e.target.files[0], {
    header: true,
    skipEmptyLines: true,
    delimiter: "",
    complete: r => {
      netSuiteData = r.data;
      alert("NetSuite loaded");
    }
  });
});

// -------------------------
async function loadCycleData() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const parsed = Papa.parse(text.trim(), {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });

  cycleData = parsed.data;
}

// -------------------------
async function loadCycleDataAndShowOptions() {
  await loadCycleData();

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normDate(r["Timestamp"]);

    if (!bin || !date) return;

    map[`${date}|${bin}`] = true;
  });

  const div = document.getElementById("options");
  div.innerHTML = "";

  Object.keys(map).forEach(k => {
    const [date, bin] = k.split("|");

    const d = new Date(date + "T00:00:00");
    const label = d.toLocaleDateString(undefined, {
      month: "long",
      day: "numeric"
    });

    const btn = document.createElement("button");
    btn.innerText = `${label}, Bin ${bin}`;

    btn.onclick = () => runAdjustment(bin, date);

    div.appendChild(btn);
  });

  document.getElementById("binDateSelector").style.display = "block";
}

// -------------------------
// CORE LEDGER BUILD (NEW LOGIC)
// -------------------------
function runAdjustment(bin, date) {

  const tbody = document.querySelector("#resultTable tbody");
  tbody.innerHTML = "";

  const ledger = {};

  // -------------------------
  // 1. NETSUITE (- ON HAND)
  // -------------------------
  const nsRows = netSuiteData.filter(r =>
    clean(r["Bin Number"]) === bin
  );

  nsRows.forEach(r => {
    const key = [
      clean(r["Item"]),
      clean(r["LOT"]),
      normDate(r["Expiration Date"]),
      clean(r["Bin Number"])
    ].join("|");

    ledger[key] = (ledger[key] || 0) - parseFloat(r["On Hand"] || 0);
  });

  // -------------------------
  // 2. CYCLE COUNT (+ ON HAND)
  // -------------------------
  const ccRows = cycleData.filter(r =>
    clean(r["Bin"]) === bin &&
    normDate(r["Timestamp"]) === date
  );

  ccRows.forEach(r => {
    const key = [
      clean(r["SKU"]),
      clean(r["Lot"]),
      normDate(r["Expiration Date"]),
      clean(r["Bin"])
    ].join("|");

    ledger[key] = (ledger[key] || 0) + parseFloat(r["On Hand"] || 0);
  });

  // -------------------------
  // 3. OUTPUT
  // -------------------------
  const rows = Object.entries(ledger).map(([key, adj]) => {
    const [item, lot, exp, b] = key.split("|");

    return { item, lot, exp, bin: b, adj };
  });

  rows.sort((a, b) =>
    a.item.localeCompare(b.item, undefined, { numeric: true }) ||
    a.lot.localeCompare(b.lot)
  );

  rows.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.item}</td>
        <td>${r.lot}</td>
        <td>${r.exp}</td>
        <td>${r.bin}</td>
        <td>${r.adj > 0 ? "+" : ""}${r.adj}</td>
      </tr>
    `;
  });
}

</script>

</body>
</html>
