<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Wizard</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>Scanner Adjustment Wizard</h2>

<button onclick="startFlow()">Create New Adjustment</button>

<div id="step1" style="display:none;">
  <h3>Loading Google Sheet...</h3>
  <div id="status"></div>
</div>

<div id="step2" style="display:none;">
  <h3>Upload NetSuite XLS/XLSX</h3>
  <input type="file" id="fileInput" accept=".xls,.xlsx">
</div>

<div id="step3" style="display:none;">
  <h3>Select Cycle Batch</h3>
  <div id="batchOptions"></div>
</div>

<div id="step4" style="display:none;">
  <h3>Adjustment Results</h3>

  <table border="1">
    <thead>
      <tr>
        <th>Item</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Bin</th>
        <th>Adjustment</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

<script>

// =====================
// STATE
// =====================
let cycleData = [];
let netSuiteData = [];
let selectedBin = "";
let selectedDate = "";

// =====================
// HELPERS
// =====================
function clean(v){
  return (v || "").toString().trim().toUpperCase();
}

function num(v){
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

// =====================
// DATE NORMALIZER (FIXED)
// =====================
function normDate(v){

  if (!v) return "";

  const s = v.toString().trim();

  // ISO (Google Sheet)
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    return s;
  }

  // NetSuite: 23-10-29 (DD-MM-YY)
  if (/^\d{1,2}-\d{1,2}-\d{2}$/.test(s)) {

    const parts = s.split("-");

    const day = parts[0].padStart(2, "0");
    const month = parts[1].padStart(2, "0");
    const year = "20" + parts[2];

    return `${year}-${month}-${day}`;
  }

  // Excel numeric date fallback
  if (!isNaN(v) && typeof v === "number") {
    const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000);
    return d.toISOString().split("T")[0];
  }

  const d = new Date(v);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

// =====================
// KEY BUILDER
// =====================
function key(item, lot, exp, bin){
  return [
    clean(item),
    clean(lot),
    normDate(exp),
    clean(bin)
  ].join("|");
}

// =====================
// START FLOW
// =====================
function startFlow(){
  document.getElementById("step1").style.display = "block";
  loadGoogleSheet();
}

// =====================
// GOOGLE SHEET
// =====================
async function loadGoogleSheet(){

  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9buyeY2V9qHg10FJJ3JbuyV-o8xvbF2QEGSLgX-3cIdgwR7fDJoY_BLiiAOQYCUHv0qcQ3fMLVDv-/pub?output=csv");
  const text = await res.text();

  const parsed = Papa.parse(text.trim(), {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });

  cycleData = parsed.data;

  document.getElementById("status").innerText = "Google Sheet Loaded ✔";
  document.getElementById("step2").style.display = "block";
}

// =====================
// NETSUITE XLS/XLSX LOAD
// =====================
document.getElementById("fileInput").addEventListener("change", e => {

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){

    const data = new Uint8Array(evt.target.result);

    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    netSuiteData = json.map(r => ({
      Item: r["Item"],
      Lot: r["LOT"],
      Expiration: r["Expiration Date"],
      Bin: r["Bin Number"],
      OnHand: r["On Hand"]
    }));

    buildBatchOptions();
    document.getElementById("step3").style.display = "block";
  };

  reader.readAsArrayBuffer(file);
});

// =====================
// BUILD BATCH OPTIONS
// =====================
function buildBatchOptions(){

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normDate(r["Timestamp"]);

    if (!bin || !date) return;

    map[`${date}|${bin}`] = true;
  });

  const div = document.getElementById("batchOptions");
  div.innerHTML = "";

  Object.keys(map).forEach(k => {

    const [date, bin] = k.split("|");

    const d = new Date(date + "T00:00:00");

    const label = d.toLocaleDateString(undefined,{
      month:"long",
      day:"numeric"
    });

    const btn = document.createElement("button");
    btn.innerText = `${label}, Bin ${bin}`;

    btn.onclick = () => {
      selectedBin = bin;
      selectedDate = date;
      runCalculation();
    };

    div.appendChild(btn);
  });
}

// =====================
// CORE CALCULATION
// =====================
function runCalculation(){

  const ledger = {};

  // -------------------
  // NETSUITE (-)
  // -------------------
  netSuiteData
    .filter(r => clean(r.Bin) === selectedBin)
    .forEach(r => {

      const k = key(
        r.Item,
        r.Lot,
        r.Expiration,
        r.Bin
      );

      ledger[k] = (ledger[k] || 0) - num(r.OnHand);
    });

  // -------------------
  // CYCLE (+)
  // -------------------
  cycleData
    .filter(r =>
      clean(r["Bin"]) === selectedBin &&
      normDate(r["Timestamp"]) === selectedDate
    )
    .forEach(r => {

      const k = key(
        r["SKU"],
        r["Lot"],
        r["Expiration Date"],
        r["Bin"]
      );

      ledger[k] = (ledger[k] || 0) + num(r["On Hand"]);
    });

  // -------------------
  // OUTPUT
  // -------------------
  const rows = Object.entries(ledger).map(([k,v])=>{
    const [item,lot,exp,bin] = k.split("|");
    return {item,lot,exp,bin,adj:v};
  });

  rows.sort((a,b)=>
    a.item.localeCompare(b.item,undefined,{numeric:true}) ||
    a.lot.localeCompare(b.lot)
  );

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${r.item}</td>
        <td>${r.lot}</td>
        <td>${r.exp}</td>
        <td>${r.bin}</td>
        <td>${r.adj>0?"+":""}${r.adj}</td>
      </tr>`;
  });

  document.getElementById("step4").style.display = "block";
}

</script>

</body>
</html>
