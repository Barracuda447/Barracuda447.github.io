<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Results</title>

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e6e6;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: #2a2f3a;
      --success: #2ecc71;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      padding-bottom: 90px;
    }

    h2 {
      text-align: center;
      margin: 10px 0 14px;
      font-size: 22px;
    }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 10px;
      font-size: 14px;
      text-align: left;
    }

    th {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .empty {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    button {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.99);
    }

    /* Mobile card mode */
    @media (max-width: 700px) {
      thead {
        display: none;
      }

      tr {
        display: block;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      td {
        display: flex;
        justify-content: space-between;
        border: none;
        padding: 6px 4px;
      }

      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }
    }

  </style>
</head>

<body>

  <h2>Scan Results</h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>SKU</th>
          <th>LOT</th>
          <th>EXP</th>
          <th>QTY</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <p class="empty" id="emptyMsg" style="display:none;">
    No scanned items found.
  </p>

  <button onclick="sendToCount()">Send to Count</button>

  <script>
    const sessionKey = "scanSession";
    const countKey = "cycleCountData";

    function load() {
      const data = JSON.parse(sessionStorage.getItem(sessionKey)) || [];

      const tbody = document.getElementById("tableBody");
      const emptyMsg = document.getElementById("emptyMsg");

      tbody.innerHTML = "";

      if (!data.length) {
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      data.forEach(item => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td data-label="SKU">${item.sku}</td>
          <td data-label="LOT">${item.lot || ""}</td>
          <td data-label="EXP">${item.exp || ""}</td>
          <td data-label="QTY">${item.qty}</td>
        `;

        tbody.appendChild(row);
      });
    }

    function sendToCount() {
      const sessionData = JSON.parse(sessionStorage.getItem(sessionKey)) || [];
      let existing = JSON.parse(localStorage.getItem(countKey)) || [];

      if (!sessionData.length) {
        alert("No scanned items to send.");
        return;
      }

      sessionData.forEach(item => {

        const match = existing.find(x =>
          x.warehouse === item.warehouse &&
          x.bin === item.bin &&
          x.sku === item.sku &&
          x.lot === item.lot &&
          x.expiry === item.exp
        );

        if (match) {
          match.qty += item.qty;
        } else {
          existing.push({
            warehouse: item.warehouse,
            bin: item.bin,
            sku: item.sku,
            lot: item.lot,
            expiry: item.exp,
            qty: item.qty
          });
        }
      });

      localStorage.setItem(countKey, JSON.stringify(existing));

      sessionStorage.removeItem(sessionKey);

      window.location.href =
        "count.html?warehouse=" + encodeURIComponent(sessionData[0].warehouse || "") +
        "&bin=" + encodeURIComponent(sessionData[0].bin || "");
    }

    load();
  </script>

</body>
</html>
