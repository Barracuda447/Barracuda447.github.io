<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan Results</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    button {
      padding: 12px;
      margin-top: 20px;
      width: 100%;
      background: #007BFF;
      color: white;
      border: none;
      font-size: 16px;
    }

    .empty {
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>
<body>

  <h2>Scan Results</h2>

  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>LOT</th>
        <th>EXP</th>
        <th>QTY</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <p class="empty" id="emptyMsg" style="display:none;">
    No scanned items found.
  </p>

  <button onclick="sendToCount()">Send to Count</button>

  <script>
    const sessionKey = "scanSession";
    const countKey = "cycleCountData";

    function load() {
      const data = JSON.parse(sessionStorage.getItem(sessionKey)) || [];

      const tbody = document.getElementById("tableBody");
      const emptyMsg = document.getElementById("emptyMsg");

      tbody.innerHTML = "";

      if (!data.length) {
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      data.forEach(item => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${item.sku}</td>
          <td>${item.lot || ""}</td>
          <td>${item.exp || ""}</td>
          <td>${item.qty}</td>
        `;

        tbody.appendChild(row);
      });
    }

    function sendToCount() {
      const sessionData = JSON.parse(sessionStorage.getItem(sessionKey)) || [];
      let existing = JSON.parse(localStorage.getItem(countKey)) || [];

      if (!sessionData.length) {
        alert("No scanned items to send.");
        return;
      }

      sessionData.forEach(item => {

        const match = existing.find(x =>
          x.warehouse === item.warehouse &&
          x.bin === item.bin &&
          x.sku === item.sku &&
          x.lot === item.lot &&
          x.expiry === item.exp
        );

        if (match) {
          match.qty += item.qty;
        } else {
          existing.push({
            warehouse: item.warehouse,
            bin: item.bin,
            sku: item.sku,
            lot: item.lot,
            expiry: item.exp,
            qty: item.qty
          });
        }
      });

      localStorage.setItem(countKey, JSON.stringify(existing));

      sessionStorage.removeItem(sessionKey);

      window.location.href =
        "count.html?warehouse=" + encodeURIComponent(sessionData[0].warehouse || "") +
        "&bin=" + encodeURIComponent(sessionData[0].bin || "");
    }

    load();
  </script>

</body>
</html>
