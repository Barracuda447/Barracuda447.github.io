<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving Scanner</title>

<style>
body {
    font-family: Arial;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    margin: 0;
    padding: 12px;
    font-size: 18px;
    user-select: none;
}

h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 10px;
}

.hidden { display: none; }

input, select {
    width: 100%;
    font-size: 20px;
    padding: 14px;
    margin: 8px 0;
    background: black;
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 6px;
}

button {
    padding: 18px;
    font-size: 20px;
    cursor: pointer;
    background: black;
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 8px;
}

button:active,
button:hover {
    background: rgb(255,224,0);
    color: black;
}

.topButtons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

table {
    border-collapse: collapse;
    margin-top: 20px;
    width: 100%;
}

td, th {
    border: 1px solid rgb(255,224,0);
    padding: 10px;
    text-align: center;
}

th {
    background: rgb(255,224,0);
    color: black;
}

#errorMsg {
    text-align: center;
    margin-top: 10px;
    min-height: 24px;
}
</style>
</head>

<body>

<h2>Receiving Scanner</h2>

<p><strong>PO:</strong> <span id="poDisplay"></span></p>

<div id="skuSection">
    <input type="text" id="sku" placeholder="Enter SKU">
    <button onclick="startScanning()">Start Scanning</button>
</div>

<div id="scanSection" class="hidden">
    <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>

    <div class="topButtons">
        <button onclick="nextSKU()">Next SKU</button>
        <button onclick="completeReceiving()">Complete Receiving</button>
        <button onclick="openManual()">Manual Add LOT</button>
    </div>

    <p>Scan items...</p>
    <input type="text" id="scanInput" autofocus>
    <div id="errorMsg"></div>
</div>

<table id="resultTable" class="hidden">
<thead>
<tr>
    <th>SKU</th>
    <th>LOT</th>
    <th>EXP</th>
    <th>QTY</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>
<button onclick="resetAll()">Reset</button>

<!-- =========================
     MANUAL MODAL
========================= -->
<div id="manualModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); align-items:center; justify-content:center;">
    <div style="background:black; padding:20px; width:100%; max-width:420px; border:2px solid rgb(255,224,0); border-radius:10px;">
        <h3 style="text-align:center;">Manual LOT Entry</h3>

        <input id="mLot" placeholder="LOT">

        <select id="mYear"></select>
        <select id="mMonth"></select>
        <select id="mDay"></select>

        <input id="mQty" type="number" placeholder="Quantity">

        <button onclick="addManual()">Add</button>
        <button onclick="closeManual()">Cancel</button>
    </div>
</div>

<script>

const po = localStorage.getItem("poNumber");
const session = localStorage.getItem("receivingSession");

if (!po) {
    alert("No PO found");
    window.location.href = "receiving.html";
}

document.getElementById("poDisplay").innerText = po;

let currentSKU = "";
let dataStore = {};

const scanInput = document.getElementById('scanInput');
const tableBody = document.querySelector('#resultTable tbody');
const errorMsg = document.getElementById('errorMsg');

let buffer = '';
let timer = null;
let lastInputTime = Date.now();

/* =========================
   START SCANNING
========================= */
function startScanning() {
    const sku = document.getElementById('sku').value.trim();
    if (!sku) return alert("Enter SKU");

    currentSKU = sku.toUpperCase();

    document.getElementById('skuDisplay').innerText = currentSKU;

    document.getElementById('skuSection').classList.add('hidden');
    document.getElementById('scanSection').classList.remove('hidden');
    document.getElementById('resultTable').classList.remove('hidden');

    scanInput.focus();
}

/* =========================
   NEXT SKU
========================= */
function nextSKU() {
    const newSku = prompt("Enter next SKU:");
    if (!newSku) return;

    currentSKU = newSku.toUpperCase();
    document.getElementById('skuDisplay').innerText = currentSKU;

    scanInput.focus();
}

/* =========================
   COMPLETE RECEIVING
========================= */
function completeReceiving() {
    if (!confirm("Finish receiving and review?")) return;

    const exportData = Object.values(dataStore).map(item => ({
        timestamp: new Date().toISOString(),
        po,
        session,
        sku: item.sku,
        lot: item.lot,
        exp: item.exp,
        qty: item.qty
    }));

    localStorage.setItem("receivingReview", JSON.stringify(exportData));

    window.location.href = "receivingReview.html";
}

/* =========================
   SCANNER INPUT
========================= */
scanInput.addEventListener('input', function () {
    const now = Date.now();
    const diff = now - lastInputTime;
    lastInputTime = now;

    if (diff > 50) buffer = '';

    buffer += scanInput.value;
    scanInput.value = '';

    clearTimeout(timer);
    timer = setTimeout(() => {
        processScan(buffer);
        buffer = '';
    }, 50);
});

/* =========================
   ERROR
========================= */
function showError(msg) {
    errorMsg.innerText = msg;
    setTimeout(() => errorMsg.innerText = '', 1500);
}

/* =========================
   BARCODE PARSER
========================= */
function processScan(raw) {
    if (!raw) return;

    const GS = String.fromCharCode(29);
    let working = raw;

    let exp = '';
    let lot = '';

    // Remove GS1 prefix (01...)
    if (working.startsWith('01') && working.length >= 16) {
        working = working.substr(16);
    }

    // EXPIRY (17YYMMDD)
    let expIndex = working.indexOf('17');
    if (expIndex !== -1 && working.length >= expIndex + 8) {
        const expRaw = working.substr(expIndex + 2, 6);
        exp = `20${expRaw.slice(0,2)}-${expRaw.slice(2,4)}-${expRaw.slice(4,6)}`;
        working = working.substring(0, expIndex) + working.substring(expIndex + 8);
    }

    // MANUFACTURING DATE (11...) → ignore but strip
    let mfgIndex = working.indexOf('11');
    if (mfgIndex !== -1 && working.length >= mfgIndex + 8) {
        working = working.substring(0, mfgIndex) + working.substring(mfgIndex + 8);
    }

    // LOT (10...)
    let lotIndex = working.indexOf('10');
    if (lotIndex !== -1) {
        let i = lotIndex + 2;
        let value = '';

        while (i < working.length && working[i] !== GS) {
            value += working[i];
            i++;
        }

        lot = value;
    }

    if (!lot) {
        showError("Invalid barcode scanned");
        return;
    }

    const key = currentSKU + "|" + lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = {
            sku: currentSKU,
            lot,
            exp,
            qty: 0
        };
    }

    dataStore[key].qty++;

    renderTable();
}

/* =========================
   TABLE
========================= */
function renderTable() {
    tableBody.innerHTML = '';

    Object.values(dataStore).forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.sku}</td>
            <td>${item.lot}</td>
            <td>${item.exp}</td>
            <td>${item.qty}</td>
        `;
        tableBody.appendChild(row);
    });
}

/* =========================
   RESET
========================= */
function resetAll() {
    location.reload();
}

/* =========================
   MANUAL ENTRY
========================= */
function openManual() {
    document.getElementById('manualModal').style.display = 'flex';
}

function closeManual() {
    document.getElementById('manualModal').style.display = 'none';
}

function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
}

function isValidDate(y, m, d) {
    const days = {
        1:31,2:isLeapYear(y)?29:28,3:31,4:30,5:31,6:30,
        7:31,8:31,9:30,10:31,11:30,12:31
    };
    return days[m] && d >= 1 && d <= days[m];
}

(function initDropdowns() {
    const y = document.getElementById("mYear");
    const m = document.getElementById("mMonth");

    const now = new Date().getFullYear();

    y.innerHTML = `<option value="">Year</option>`;
    for (let i = now - 3; i <= now + 10; i++) {
        y.innerHTML += `<option value="${i}">${i}</option>`;
    }

    m.innerHTML = `<option value="">Month</option>`;
    for (let i = 1; i <= 12; i++) {
        let mm = String(i).padStart(2,'0');
        m.innerHTML += `<option value="${mm}">${mm}</option>`;
    }
})();

function updateDays() {
    const y = parseInt(document.getElementById("mYear").value);
    const m = parseInt(document.getElementById("mMonth").value);
    const d = document.getElementById("mDay");

    d.innerHTML = `<option value="">Day</option>`;
    if (!y || !m) return;

    const max = {
        1:31,2:isLeapYear(y)?29:28,3:31,4:30,5:31,6:30,
        7:31,8:31,9:30,10:31,11:30,12:31
    }[m];

    for (let i = 1; i <= max; i++) {
        let dd = String(i).padStart(2,'0');
        d.innerHTML += `<option value="${dd}">${dd}</option>`;
    }
}

document.getElementById("mYear").addEventListener("change", updateDays);
document.getElementById("mMonth").addEventListener("change", updateDays);

function addManual() {
    const lot = document.getElementById('mLot').value.trim();
    const qty = parseInt(document.getElementById('mQty').value);

    const y = document.getElementById('mYear').value;
    const m = document.getElementById('mMonth').value;
    const d = document.getElementById('mDay').value;

    if (!currentSKU) return alert("Enter SKU first");
    if (!lot || !qty || !y || !m || !d) return alert("Fill all fields");

    if (!isValidDate(parseInt(y), parseInt(m), parseInt(d))) {
        return alert("Invalid date");
    }

    const exp = `${y}-${m}-${d}`;
    const key = currentSKU + "|" + lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = { sku: currentSKU, lot, exp, qty: 0 };
    }

    dataStore[key].qty += qty;

    renderTable();
    closeManual();

    document.getElementById('mLot').value = '';
    document.getElementById('mQty').value = '';
}

</script>

</body>
</html>
